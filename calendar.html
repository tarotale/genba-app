<!DOCTYPE html>
<html lang="ja">
<head>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChumToto Schedule Manager</title>
    
    <link rel="apple-touch-icon" href="icon.png">

    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0d080a 0%, #1a1014 50%, #0d080a 100%);
            --header-gradient: linear-gradient(180deg, #24141a 0%, rgba(36, 20, 26, 0.95) 100%);
            --color-chumtoto: #FF6B9D;
            --text-main: #f5f0f2;
            --text-muted: #9e8891;
            --card-bg: linear-gradient(135deg, rgba(255, 107, 157, 0.12) 0%, rgba(255, 255, 255, 0.02) 100%);
            --card-border: rgba(255, 107, 157, 0.3);
        }

        body {
            margin: 0;
            font-family: 'Hiragino Kaku Gothic ProN', 'Yu Gothic', sans-serif;
            background: var(--bg-gradient);
            color: var(--text-main);
            min-height: 100vh;
            padding-bottom: 100px;
        }

        /* 💡 ヘッダー：被りバグを防ぐフレックス配置に修正 */
        header {
            background: var(--header-gradient);
            border-bottom: 1px solid rgba(255, 107, 157, 0.15);
            padding: 10px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            backdrop-filter: blur(12px);
            position: sticky;
            top: 0;
            z-index: 100;
            height: 38px;
            box-sizing: border-box;
            gap: 10px;
        }

        .back-portal-btn {
            color: var(--color-chumtoto);
            text-decoration: none;
            font-size: 11px;
            font-weight: bold;
            border: 1px solid rgba(255, 107, 157, 0.3);
            padding: 5px 8px;
            border-radius: 6px;
            background: rgba(255, 107, 157, 0.05);
            transition: 0.2s;
            white-space: nowrap;
            flex-shrink: 0;
        }
        .back-portal-btn:hover {
            background: rgba(255, 107, 157, 0.15);
        }

        header h1 {
            margin: 0;
            font-size: 13px;
            font-weight: 800;
            letter-spacing: 0.5px;
            color: #fff;
            text-shadow: 0 0 8px rgba(255, 107, 157, 0.4);
            flex: 1;
            text-align: right;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
            padding: 16px;
            box-sizing: border-box;
        }

        .view-switcher {
            display: flex;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 107, 157, 0.2);
            border-radius: 10px;
            padding: 4px;
            margin-bottom: 16px;
            gap: 4px;
        }

        .switch-btn {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-muted);
            padding: 10px 4px;
            border-radius: 7px;
            font-size: 11px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            text-align: center;
            white-space: nowrap;
        }

        .switch-btn.active {
            background: var(--color-chumtoto);
            color: #fff;
            box-shadow: 0 2px 8px rgba(255, 107, 157, 0.4);
        }

        /* カレンダー表示エリア */
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 4px;
            background: rgba(0, 0, 0, 0.2);
            padding: 8px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.03);
            margin-bottom: 16px;
        }

        .weekday {
            text-align: center;
            font-size: 10px;
            font-weight: bold;
            color: var(--text-muted);
            padding: 4px 0;
        }

        .cal-day {
            aspect-ratio: 1;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 6px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 4px;
            box-sizing: border-box;
            font-size: 11px;
            font-weight: bold;
            color: rgba(255, 255, 255, 0.4);
            border: 1px solid transparent;
        }

        .cal-day.current-month {
            color: var(--text-main);
        }

        .cal-day.today {
            background: rgba(255, 107, 157, 0.15);
            border: 1px solid rgba(255, 107, 157, 0.4);
            color: var(--color-chumtoto);
        }

        .cal-day.has-event {
            background: linear-gradient(135deg, rgba(255, 107, 157, 0.25) 0%, rgba(255, 107, 157, 0.05) 100%);
            border: 1px solid rgba(255, 107, 157, 0.4);
            color: #fff;
            cursor: pointer;
        }

        .event-dot {
            width: 5px;
            height: 5px;
            background: var(--color-chumtoto);
            border-radius: 50%;
            align-self: center;
            margin-bottom: 2px;
            box-shadow: 0 0 6px var(--color-chumtoto);
        }

        .month-label {
            text-align: center;
            font-size: 14px;
            font-weight: 900;
            letter-spacing: 2px;
            margin-bottom: 12px;
            color: #fff;
        }

        .section-title {
            font-size: 12px;
            font-weight: bold;
            color: var(--text-muted);
            margin-bottom: 10px;
            letter-spacing: 1px;
        }

        .event-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        /* 💡 リスト表示のカードスタイル（今日を目立たせる装飾を内包） */
        .event-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            padding: 14px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            cursor: pointer;
            transition: 0.2s;
            scroll-margin-top: 70px; /* スクロール時のヘッダー被り防止マージン */
        }

        .event-card:hover {
            background: rgba(255, 107, 157, 0.08);
            border-color: rgba(255, 107, 157, 0.5);
        }

        /* 💡 スクロールターゲット（今日）用のボーダースタイル */
        .event-card.scroll-target {
            border: 2px solid var(--color-chumtoto) !important;
            background: rgba(255, 107, 157, 0.12);
            box-shadow: 0 0 15px rgba(255, 107, 157, 0.25);
        }

        .event-title {
            font-size: 13px;
            font-weight: bold;
            color: #fff;
            margin-bottom: 6px;
            line-height: 1.4;
        }

        .event-info {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 2px;
            font-weight: 500;
        }

        /* ボトムナビゲーションバー */
        .nav-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(19, 11, 14, 0.92);
            border-top: 1px solid rgba(255, 107, 157, 0.1);
            display: flex;
            padding: 6px 0;
            backdrop-filter: blur(10px);
            z-index: 100;
        }

        .nav-item {
            flex: 1;
            text-align: center;
            text-decoration: none;
            color: var(--text-muted);
            font-size: 10px;
            font-weight: bold;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .nav-item.active {
            color: var(--color-chumtoto);
        }

        .nav-icon {
            font-size: 18px;
        }

        .loading-cover {
            text-align: center;
            color: var(--color-chumtoto);
            font-weight: bold;
            padding: 40px;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

<header>
    <a href="index.html" class="back-portal-btn">◀ Portal</a>
    <h1>ChumToto Official Calendar</h1>
</header>

<div class="container">
    <div class="view-switcher">
        <button class="switch-btn active" id="calendarToggle">📅 カレンダー表示</button>
        <button class="switch-btn" id="listToggle">📋 リスト表示</button>
    </div>

    <div id="loading-msg" class="loading-cover">Fetching Schedule...</div>

    <div id="calendar-view-area" style="display: none;">
        <div class="month-label" id="current-month-lbl"></div>
        <div class="calendar-grid" id="calendar-grid-box"></div>
    </div>

    <div id="list-view-area" style="display: none;">
        <div class="section-title" id="list-title-lbl">Upcoming Schedule</div>
    </div>
    
    <div class="event-list" id="event-display-list" style="display: none;"></div>
</div>

<nav class="nav-bar">
    <a href="calendar.html" class="nav-item active"><span class="nav-icon">📅</span>Schedule</a>
    <a href="dashboard.html" class="nav-item"><span class="nav-icon">📊</span>Stats</a>
    <a href="entry.html" class="nav-item"><span class="nav-icon">✍️</span>Entry</a>
</nav>

<script>
    if (("standalone" in window.navigator) && window.navigator.standalone) {
    document.addEventListener('click', function(e) {
        let target = e.target;
        while (target && target.tagName !== 'A') { target = target.parentNode; }
        if (target && target.hasAttribute('href')) {
            let href = target.getAttribute('href');
            if (!href.match(/^https?:\/\//) && !href.startsWith('#') && !href.startsWith('javascript:')) {
                e.preventDefault();
                window.location.href = href;
            }
        }
    }, false);
}
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbw7KeuN0XckEqU9V4wRxR3O8T9Rl6cC2jQesEOpOsNJTF09ZylpVFZWJnqo0aff1YNFRw/exec';
    let scheduleEvents = [];
    let viewMode = "calendar";

    window.onload = async function() {
        try {
            const response = await fetch(GAS_URL + "?action=read_schedule");
            const res = await response.json();
            if (res.result === "success") {
                scheduleEvents = res.data;
                document.getElementById('loading-msg').style.display = 'none';
                render(false);
            }
        } catch(e) {
            document.getElementById('loading-msg').innerText = "Failed To Data Sync";
        }
    }

    function render(isListMode) {
        const calArea = document.getElementById('calendar-view-area');
        const listArea = document.getElementById('list-view-area');
        const listContainer = document.getElementById('event-display-list');

        if (isListMode) {
            calArea.style.display = 'none';
            listArea.style.display = 'block';
            listContainer.style.display = 'flex';
            renderListView(scheduleEvents);
        } else {
            calArea.style.display = 'block';
            listArea.style.display = 'none';
            listContainer.style.display = 'flex';
            renderCalendarView(scheduleEvents);
        }
    }

    function renderCalendarView(events) {
        const grid = document.getElementById('calendar-grid-box');
        const lbl = document.getElementById('current-month-lbl');
        const listContainer = document.getElementById('event-display-list');
        grid.innerHTML = '';
        listContainer.innerHTML = '';

        const today = new Date();
        const year = today.getFullYear();
        const month = today.getMonth();

        lbl.innerText = `${year}年 ${month + 1}月`;

        const weekdays = ['日', '月', '火', '水', '木', '金', '土'];
        weekdays.forEach(w => grid.innerHTML += `<div class="weekday">${w}</div>`);

        const firstDay = new Date(year, month, 1).getDay();
        const lastDate = new Date(year, month + 1, 0).getDate();
        const prevLastDate = new Date(year, month, 0).getDate();

        for (let i = firstDay - 1; i >= 0; i--) {
            grid.innerHTML += `<div class="cal-day">${prevLastDate - i}</div>`;
        }

        let todaySet = null;
        for (let d = 1; d <= lastDate; d++) {
            const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
            const dayEvents = events.filter(e => e.date === dateStr);
            
            let isToday = (d === today.getDate());
            let dayClass = isToday ? "cal-day current-month today" : "cal-day current-month";
            if (dayEvents.length > 0) dayClass += " has-event";

            let dotHtml = dayEvents.length > 0 ? '<div class="event-dot"></div>' : '';
            let clickAttr = dayEvents.length > 0 ? `onclick=\"showSelectedDayEvents('${dateStr}')\"` : '';

            grid.innerHTML += `
                <div class="${dayClass}" ${clickAttr}>
                    <span>${d}</span>
                    ${dotHtml}
                </div>
            `;
            if (isToday && dayEvents.length > 0) todaySet = dateStr;
        }

        const totalCells = firstDay + lastDate;
        const nextCells = totalCells % 7 === 0 ? 0 : 7 - (totalCells % 7);
        for (let n = 1; n <= nextCells; n++) {
            grid.innerHTML += `<div class="cal-day">${n}</div>`;
        }

        if (todaySet) {
            showSelectedDayEvents(todaySet);
        } else {
            listContainer.innerHTML = '<div style="color:var(--text-muted); font-size:11px; text-align:center; width:100%; padding:10px;">本日指定の公式スケジュールはありません</div>';
        }
    }

    // 💡 リスト表示生成＆自動スクロールロジック
    function renderListView(events) {
        const listContainer = document.getElementById('event-display-list');
        if (events.length === 0) {
            listContainer.innerHTML = '<div style="color:var(--text-muted); font-size:11px; text-align:center; width:100%;">予定されているスケジュールはありません</div>';
            return;
        }

        // 今日を表す日付文字列を取得 (YYYY-MM-DD)
        const today = new Date();
        const todayStr = today.getFullYear() + '-' + String(today.getMonth() + 1).padStart(2, '0') + '-' + String(today.getDate()).padStart(2, '0');

        const sorted = [...events].sort((a,b) => (a.date || '').localeCompare(b.date || ''));
        
        // 最も今日に近い（今日、または今日以降で一番近い）イベントのインデックスを探す
        let targetId = null;
        let minDiff = Infinity;

        sorted.forEach((ev, idx) => {
            if (!ev.date) return;
            const diff = new Date(ev.date) - today;
            // 今日当日、もしくは今日より未来のイベントの中で一番近ければ候補にする
            if (ev.date === todayStr) {
                targetId = `ev-card-${idx}`;
                minDiff = -1; // 当日確定マーク
            } else if (diff > 0 && diff < minDiff && minDiff !== -1) {
                minDiff = diff;
                targetId = `ev-card-${idx}`;
            }
        });

        // 過去のイベントしか無い場合は最後のイベントをターゲットにする
        if (!targetId && sorted.length > 0) {
            targetId = `ev-card-${sorted.length - 1}`;
        }

        listContainer.innerHTML = sorted.map((ev, idx) => {
            let dateBadge = '';
            let cardId = `ev-card-${idx}`;
            let extraClass = (cardId === targetId) ? "scroll-target" : ""; // ターゲット対象をハイライトするクラス

            if(ev.date) {
                const [y, m, d] = ev.date.split('-');
                dateBadge = `<span style="color:var(--color-chumtoto); font-weight:bold; margin-right:6px;">[${parseInt(m)}/${parseInt(d)}]</span>`;
            }
            const timeInfo = ev.time ? `<div class="event-info">⏰ ${ev.time}</div>` : '';
            const venueInfo = `<div class="event-info">📍 ${ev.venue || '詳細確認'}</div>`;
            const clickAction = `onclick="moveToEntry('${ev.date}', '${encodeURIComponent(ev.title)}', '${encodeURIComponent(ev.venue)}')"`

            return `
                <div id="${cardId}" class="event-card ${extraClass}" ${clickAction}>
                    <div class="event-title">${dateBadge}${ev.title}</div>
                    ${timeInfo}
                    ${venueInfo}
                </div>
            `;
        }).join('');

        // 💡 描画直後、ターゲットに選ばれたカードまでスムースに自動スクロールさせる
        if (targetId) {
            setTimeout(() => {
                const targetCard = document.getElementById(targetId);
                if (targetCard) {
                    targetCard.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                }
            }, 100);
        }
    }

    function createEventCard(ev) {
        const timeInfo = ev.time ? `<div class="event-info">⏰ ${ev.time}</div>` : '';
        const venueInfo = `<div class="event-info">📍 ${ev.venue || '詳細確認'}</div>`;
        const clickAction = `onclick="moveToEntry('${ev.date}', '${encodeURIComponent(ev.title)}', '${encodeURIComponent(ev.venue)}')"`

        return `
            <div class="event-card" ${clickAction}>
                <div class="event-title">${ev.title}</div>
                ${timeInfo}
                ${venueInfo}
            </div>
        `;
    }

    function moveToEntry(date, title, venue) {
        const targetUrl = `entry.html?date=${date}&event=${title}&location=${venue}`;
        if (confirm(`選択した現場を記録しますか？\n\n現場：${decodeURIComponent(title)}`)) {
            window.location.href = targetUrl;
        }
    }

    document.getElementById('listToggle').addEventListener('click', () => {
        viewMode = "list";
        document.getElementById('listToggle').classList.add('active');
        document.getElementById('calendarToggle').classList.remove('active');
        render(true);
    });

    document.getElementById('calendarToggle').addEventListener('click', () => {
        viewMode = "calendar";
        document.getElementById('calendarToggle').classList.add('active');
        document.getElementById('listToggle').classList.remove('active');
        render(false);
    });
    // iOSのPWAでリンク遷移時にSafariのUIが出ないようにする対策
if (window.navigator.standalone) {
  document.addEventListener('click', function(event) {
    var a = event.target.closest('a');
    // aタグであり、かつ同じサイト内のリンクである場合
    if (a && a.href && a.host === location.host) {
      event.preventDefault(); // デフォルトのリンク遷移をキャンセル
      window.location.href = a.href; // JavaScriptで無理やり画面遷移させる
    }
  }, false);
}
</script>
</body>
</html>
