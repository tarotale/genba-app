<!DOCTYPE html>
<html lang="ja">
<head>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChumToto Portal - Command Center</title>
    
    <link rel="apple-touch-icon" href="icon.png">

    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0d080a 0%, #1a1014 50%, #0d080a 100%);
            --header-gradient: linear-gradient(180deg, #24141a 0%, rgba(36, 20, 26, 0.95) 100%);
            --color-chumtoto: #FF6B9D;
            --color-warn: #FF3B30;
            --color-success: #4CD964;
            --text-main: #f5f0f2;
            --text-muted: #9e8891;
            --card-bg: rgba(255, 107, 157, 0.04);
            --card-border: rgba(255, 107, 157, 0.15);
            --input-bg: rgba(0, 0, 0, 0.4);
        }

        body { margin: 0; font-family: 'Hiragino Kaku Gothic ProN', 'Yu Gothic', sans-serif; background: var(--bg-gradient); color: var(--text-main); min-height: 100vh; padding-bottom: 100px; }
        
        header {
            background: var(--header-gradient);
            border-bottom: 1px solid rgba(255, 107, 157, 0.15);
            padding: 15px 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(12px);
            position: sticky;
            top: 0;
            z-index: 100;
            height: 34px;
        }

        header h1 {
            margin: 0;
            font-size: 15px;
            font-weight: 800;
            letter-spacing: 2px;
            color: #fff;
            text-shadow: 0 0 8px rgba(255, 107, 157, 0.4);
        }

        .container { max-width: 500px; margin: 0 auto; padding: 16px; box-sizing: border-box; }

        /* 💡 復元：トップページ用サマリーカードのスタイリング */
        .summary-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .summary-mini-card { background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 12px; padding: 14px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); text-align: center; }
        .summary-mini-card.full { grid-column: span 2; text-align: left; padding: 16px; }
        .summary-card-title { font-size: 11px; color: var(--text-muted); font-weight: bold; letter-spacing: 0.5px; margin-bottom: 4px; }
        .summary-card-value { font-size: 22px; font-weight: 900; color: #fff; }
        .summary-mini-card.full .summary-card-value { font-size: 28px; }
        .rate-value { color: #5AC8FA !important; text-shadow: 0 0 8px rgba(90,200,250,0.3); }
        .cheki-value { color: var(--color-chumtoto) !important; text-shadow: 0 0 8px rgba(255,107,157,0.3); }

        /* メインメニューリンク */
        .menu-grid { display: grid; grid-template-columns: 1fr; gap: 12px; margin-bottom: 20px; }
        .menu-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            padding: 16px;
            display: flex;
            align-items: center;
            text-decoration: none;
            color: #fff;
            transition: 0.2s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .menu-card:hover {
            background: rgba(255, 107, 157, 0.08);
            border-color: rgba(255, 107, 157, 0.4);
        }
        .menu-icon { font-size: 24px; margin-right: 14px; }
        .menu-info { flex: 1; }
        .menu-title { font-size: 14px; font-weight: bold; margin-bottom: 2px; letter-spacing: 0.5px; }
        .menu-desc { font-size: 11px; color: var(--text-muted); }
        .menu-arrow { color: var(--color-chumtoto); font-size: 12px; font-weight: bold; }

        /* 警告アラートエリア */
        .alert-container { background: rgba(255, 59, 48, 0.06); border: 1px solid rgba(255, 59, 48, 0.25); border-radius: 14px; padding: 16px; margin-bottom: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
        .alert-header { display: flex; align-items: center; gap: 8px; color: var(--color-warn); font-size: 12px; font-weight: bold; letter-spacing: 1px; margin-bottom: 12px; }
        .alert-list { display: flex; flex-direction: column; gap: 10px; }
        .alert-item { background: rgba(0, 0, 0, 0.3); border: 1px solid rgba(255, 59, 48, 0.15); border-radius: 10px; padding: 12px; display: flex; justify-content: space-between; align-items: center; gap: 10px; }
        .alert-info { flex: 1; }
        .alert-date { font-size: 10px; font-weight: bold; color: var(--text-muted); margin-bottom: 3px; }
        .alert-name { font-size: 12px; font-weight: bold; color: #fff; line-height: 1.4; }
        .alert-btn { background: var(--color-warn); color: #fff; text-decoration: none; font-size: 10px; font-weight: bold; padding: 6px 10px; border-radius: 6px; white-space: nowrap; box-shadow: 0 2px 8px rgba(255,59,48,0.3); }
        .alert-del-btn { background: transparent; color: var(--text-muted); border: 1px solid rgba(255,255,255,0.18); font-size: 10px; font-weight: bold; padding: 6px 8px; border-radius: 6px; white-space: nowrap; cursor: pointer; }

        /* クリア状態エリア */
        .clear-container { background: rgba(76, 217, 100, 0.06); border: 1px solid rgba(76, 217, 100, 0.25); border-radius: 14px; padding: 24px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .clear-icon { font-size: 32px; margin-bottom: 8px; }
        .clear-title { font-size: 13px; font-weight: bold; color: var(--color-success); letter-spacing: 1px; }

        /* ボトムナビゲーションバー */
        .nav-bar { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(19, 11, 14, 0.92); border-top: 1px solid rgba(255,107,157,0.1); display: flex; padding: 6px 0; backdrop-filter: blur(10px); z-index: 100; }
        .nav-item { flex: 1; text-align: center; text-decoration: none; color: var(--text-muted); font-size: 10px; font-weight: bold; display: flex; flex-direction: column; gap: 2px; }
        .nav-item.active { color: var(--color-chumtoto); }
        .nav-icon { font-size: 18px; }

        .loading-cover { text-align: center; color: var(--color-chumtoto); font-weight: bold; padding: 50px; letter-spacing: 2px; font-size: 13px; }
    </style>
</head>
<body>

<header>
    <h1>ChumToto Field Portal</h1>
</header>

<div class="container">
    
    <div id="loading-msg" class="loading-cover">Cross-Checking Databases...</div>

    <div class="summary-cards" id="portalSummaryBox" style="display: none;">
        <div class="summary-mini-card full">
            <div class="summary-card-title">Total Expense</div>
            <div class="summary-card-value" id="top-total-expense">¥0</div>
        </div>
        <div class="summary-mini-card">
            <div class="summary-card-title">Total Chekis</div>
            <div class="summary-card-value cheki-value" id="top-total-cheki">0 枚</div>
        </div>
        <div class="summary-mini-card">
            <div class="summary-card-title">Attendance Rate</div>
            <div class="summary-card-value rate-value" id="top-attendance-rate">0%</div>
        </div>
    </div>
    
    <div class="menu-grid">
        <a href="calendar.html" class="menu-card">
            <div class="menu-icon">📅</div>
            <div class="menu-info">
                <div class="menu-title">Official Schedule</div>
                <div class="menu-desc">公式カレンダーの確認・現場記録へのジャンプ</div>
            </div>
            <div class="menu-arrow">▶</div>
        </a>
        <a href="dashboard.html" class="menu-card">
            <div class="menu-icon">📊</div>
            <div class="menu-info">
                <div class="menu-title">Field Stats</div>
                <div class="menu-desc">総投資額・チェキ枚数・月別推移グラフの分析</div>
            </div>
            <div class="menu-arrow">▶</div>
        </a>
        <a href="entry.html" class="menu-card">
            <div class="menu-icon">✍️</div>
            <div class="menu-info">
                <div class="menu-title">New Field Entry</div>
                <div class="menu-desc">現場データの新規登録・手動記録</div>
            </div>
            <div class="menu-arrow">▶</div>
        </a>
    </div>

    <div class="alert-container" id="alertBox" style="display: none;">
        <div class="alert-header">⚠️ 未入力の現場が検出されました</div>
        <div class="alert-list" id="alertList"></div>
    </div>

    <div class="clear-container" id="clearBox" style="display: none;">
        <div class="clear-icon">🎉</div>
        <div class="clear-title">すべての現場が記録されています</div>
    </div>
</div>

<nav class="nav-bar">
    <a href="calendar.html" class="nav-item"><span class="nav-icon">📅</span>Schedule</a>
    <a href="dashboard.html" class="nav-item"><span class="nav-icon">📊</span>Stats</a>
    <a href="entry.html" class="nav-item"><span class="nav-icon">✍️</span>Entry</a>
</nav>

<script>
    if (("standalone" in window.navigator) && window.navigator.standalone) {
    document.addEventListener('click', function(e) {
        let target = e.target;
        while (target && target.tagName !== 'A') { target = target.parentNode; }
        if (target && target.hasAttribute('href')) {
            let href = target.getAttribute('href');
            if (!href.match(/^https?:\/\//) && !href.startsWith('#') && !href.startsWith('javascript:')) {
                e.preventDefault();
                window.location.href = href;
            }
        }
    }, false);
}
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbw7KeuN0XckEqU9V4wRxR3O8T9Rl6cC2jQesEOpOsNJTF09ZylpVFZWJnqo0aff1YNFRw/exec';
    const PRICES = { sign_cheki: 3000, white_cheki: 2000, twoshot: 3000, tiktok: 3500, kakomi: 4000, kakomi_shame: 5000, item_sign: 4500, omiyokuri: 1500 };

    window.onload = async function() {
        try {
            const [schedRes, histRes] = await Promise.all([
                fetch(GAS_URL + "?action=read_schedule").then(r => r.json()),
                fetch(GAS_URL + "?action=read_history").then(r => r.json())
            ]);

            if (schedRes.result === "success" && histRes.result === "success") {
                document.getElementById('loading-msg').style.display = 'none';
                
                // 💡 復元：トップサマリーの計算と表示
                calculatePortalSummary(histRes.data);
                
                checkMissingEntries(schedRes.data, histRes.data);
            }
        } catch(e) {
            document.getElementById('loading-msg').innerText = "Failed To Data Sync";
        }
    }

    // 💡 復元：全履歴から「累計支出」「累計チェキ」「参加率」を割り出して反映するロジック
    function calculatePortalSummary(historyData) {
        let totalExpense = 0;
        let totalCheki = 0;
        let attendCount = 0;
        const totalRecords = historyData.length;

        historyData.forEach(row => {
            let rowTotal = parseInt(row.ticket_fee) || 0;
            Object.keys(PRICES).forEach(k => {
                rowTotal += (parseInt(row[k]) || 0) * PRICES[k];
            });
            totalExpense += rowTotal;

            // サインあり + 白チェキの合計枚数
            totalCheki += (parseInt(row.sign_cheki) || 0) + (parseInt(row.white_cheki) || 0);

            if (row.attendance === "参戦" || row.attendance === "参加") {
                attendCount++;
            }
        });

        const ratePercent = totalRecords > 0 ? Math.round((attendCount / totalRecords) * 100) : 0;

        document.getElementById('top-total-expense').innerText = `¥${totalExpense.toLocaleString()}`;
        document.getElementById('top-total-cheki').innerText = `${totalCheki} 枚`;
        document.getElementById('top-attendance-rate').innerText = `${ratePercent}%`;
        document.getElementById('portalSummaryBox').style.display = 'grid';
    }

    function checkMissingEntries(scheduleData, historyData) {
        const alertList = document.getElementById('alertList');
        alertList.innerHTML = '';

        const today = new Date();
        const todayStr = today.getFullYear() + '-' + String(today.getMonth() + 1).padStart(2, '0') + '-' + String(today.getDate()).padStart(2, '0');

        let missingCount = 0;

        scheduleData.forEach(sched => {
            if (!sched.date) return;
            
            if (sched.date <= todayStr) {
                
                const isRecorded = historyData.some(h => {
                    if (h.date !== sched.date) return false;
                    
                    const sTitleLower = (sched.title || "").trim().toLowerCase();
                    const hNameLower = (h.event_name || "").trim().toLowerCase();
                    
                    return hNameLower.includes(sTitleLower) || sTitleLower.includes(hNameLower);
                });

                if (!isRecorded) {
                    missingCount++;
                    const mDate = new Date(sched.date);
                    const displayDate = `${mDate.getMonth() + 1}/${mDate.getDate()}`;
                    
                    const itemHtml = `
                        <div class="alert-item">
                            <div class="alert-info">
                                <div class="alert-date">📅 ${displayDate} (${sched.venue || '会場未定'})</div>
                                <div class="alert-name">${sched.title}</div>
                            </div>
                            <a href="entry.html?date=${sched.date}&event=${encodeURIComponent(sched.title)}&location=${encodeURIComponent(sched.venue || '')}" class="alert-btn">今すぐ記録！</a>
                            ${sched.row_index !== undefined ? `<button onclick="deleteScheduleFromAlert(${sched.row_index}, '${encodeURIComponent(sched.title)}')" class="alert-del-btn">🗑️ 中止</button>` : ''}
                        </div>
                    `;
                    alertList.innerHTML += itemHtml;
                }
            }
        });

        if (missingCount > 0) {
            document.getElementById('alertBox').style.display = 'block';
        } else {
            document.getElementById('clearBox').style.display = 'block';
        }
    }

    // 🗑️ アラートから予定を削除（中止・リスケ対応）
    async function deleteScheduleFromAlert(rowIndex, encodedTitle) {
        const title = decodeURIComponent(encodedTitle);
        if (!confirm(`この予定を公式スケジュールから削除しますか？\n\n${title}\n\n※中止・リスケされた予定の削除に使ってください。`)) return;
        try {
            await fetch(GAS_URL, {
                method: "POST",
                body: JSON.stringify({ action: "delete_schedule", row_index: rowIndex })
            });
            alert("削除しました。ポータルを再読み込みします。");
            location.reload();
        } catch (e) {
            // GASのCORS仕様で例外に見えても削除自体は通っていることが多いので再読込
            alert("削除リクエストを送信しました。再読み込みします。");
            location.reload();
        }
    }
</script>
</body>
</html>
