name: ChumToto Schedule Auto Sync

on:
  schedule:
    - cron: '0 0,3,6,9,12,15,18,21 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install selenium webdriver-manager beautifulsoup4

    # 【Step 1】Pythonを動かして schedule.json を作成（100%成功中）
    - name: Run ChumToto Scraper
      run: |
        python chumtoto_scraper.py

    # 【Step 2】💡 GASを「全員」に公開した新しいURLへ、RAWテキストとして確実に叩き込みます
    - name: Upload Data to Google Sheets via cURL
      run: |
        if [ -f "schedule.json" ]; then
          echo "🚀 schedule.json からGAS専用のペイロードを組み立て中..."
          
          # GASが綺麗に1発パースできるトッププロパティ構造にします
          jq '{
            action: "sync_schedule",
            events: [ .[] | { group: "ChumToto", start: .date, title: .title, venue: .venue, time: .time, url: .url } ]
          }' schedule.json > gas_payload.json
          
          echo "📨 Google Apps Script（新URL）へデータを直接送信中..."
          # ⚠️ 下記の「★ここに新しいGASのURLを貼り付け★」を、先ほどデプロイした新しいURL（/execで終わるもの）に差し替えてください
          curl -L -X POST "https://script.google.com/macros/s/AKfycbzz_ulxkWibPM1bikldJ7BQFZTYCD4WP_mbw3m0gYopTHSBazTWudQamhANgaA_J4pU/exec" \
               -H "Content-Type: text/plain" \
               --data-raw "$(cat gas_payload.json)"
               
          echo -e "\n🎉 スプレッドシート（公式スケジュール）への同期送信工程が完了しました！"
        else
          echo "⚠️ schedule.json が見つかりませんでした。"
          exit 1
        fi

    # 【Step 3】生成された schedule.json をリポジトリ内に永続保存（100%成功中）
    - name: Commit and Push schedule.json
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        if [ -f "schedule.json" ]; then
          git add schedule.json
          git diff --cached --quiet || git commit -m "🤖 Auto Update ChumToto Schedule JSON"
          git push origin main
          echo "📁 schedule.json をリポジトリに保存しました！"
        fi
