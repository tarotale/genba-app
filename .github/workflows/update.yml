name: ChumToto Schedule Auto Sync

on:
  schedule:
    # 日本時間の 0, 3, 6, 9, 12, 15, 18, 21 時にあたる UTC 時間を指定
    - cron: '0 0,3,6,9,12,15,18,21 * * *'
  workflow_dispatch: # 手動実行ボタン

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # 💡 Linux環境のブラウザとドライバーの互換性問題を完全に解決するセットアップ
    - name: Setup Chrome and ChromeDriver
      uses: browser-actions/setup-chrome@v1
      with:
        chrome-version: stable
    - name: Install ChromeDriver
      run: |
        CHROME_VERSION=$(google-chrome --version | cut -d ' ' -f 3 | cut -d '.' -f 1)
        CHROMEDRIVER_VERSION=$(curl -s "https://googlechromelabs.github.io/chrome-for-testing/LATEST_RELEASE_${CHROME_VERSION}")
        curl -sS -o /tmp/chromedriver.zip "https://googlechromelabs.github.io/chrome-for-testing/${CHROMEDRIVER_VERSION}/linux64/chromedriver-linux64.zip"
        unzip -q /tmp/chromedriver.zip -d /tmp
        sudo mv /tmp/chromedriver-linux64/chromedriver /usr/local/bin/chromedriver
        sudo chmod +x /usr/local/bin/chromedriver

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install selenium beautifulsoup4 requests

    - name: Run ChumToto Scraper
      run: |
        python chumtoto_scraper.py
