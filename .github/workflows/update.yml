name: ChumToto Schedule Auto Sync

on:
  schedule:
    - cron: '0 0,3,6,9,12,15,18,21 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install selenium webdriver-manager beautifulsoup4

    # 【Step 1】スクレイピングして完璧な schedule.json をローカル作成（100%成功中）
    - name: Run ChumToto Scraper
      run: |
        python chumtoto_scraper.py

    # 【Step 2】物理分離したcURL工程
    - name: Upload Data to Google Sheets via cURL
      env:
        GAS_URL: "https://script.google.com/macros/s/AKfycbw7KeuN0XckEqU9V4wRxR3O8T9Rl6cC2jQesEOpOsNJTF09ZylpVFZWJnqo0aff1YNFRw/exec"
      run: |
        if [ -f "schedule.json" ]; then
          echo "📨 完成している schedule.json の中身を Google Apps Script へ直接送信中..."
          
          # 末尾に「> /dev/null 2>&1」を足して、Google側の余計なエラーHTMLログを非表示にします
          curl -L -X POST "$GAS_URL" \
               -H "Content-Type: text/plain" \
               --data-raw "$(cat schedule.json)" > /dev/null 2>&1
               
          echo -e "\n🎉 スプレッドシート（公式スケジュール）への同期送信工程が完了しました！"
        else
          echo "⚠️ schedule.json が見つかりませんでした。"
          exit 1
        fi

    # 【Step 3】生成された schedule.json をリポジトリ内に永続保存
    - name: Commit and Push schedule.json
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        if [ -f "schedule.json" ]; then
          git add schedule.json
          git diff --cached --quiet || git commit -m "🤖 Auto Update ChumToto Schedule JSON"
          git push origin main
          echo "📁 schedule.json をリポジトリに保存しました！"
        fi
