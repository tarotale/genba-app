<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xにログイン / X</title>
    <style>
        /* 全体のリセットと基本設定 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #000000;
            color: #eff3f4;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 16px;
        }

        /* モバイルサイズに合わせたコンテナ */
        .login-container {
            width: 100%;
            max-width: 360px;
            display: flex;
            flex-direction: column;
        }

        /* ヘッダーエリア（×ボタンとXロゴ） */
        .header {
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            height: 52px;
            margin-bottom: 12px;
        }

        .close-btn {
            position: absolute;
            left: 0;
            background: none;
            border: none;
            color: #eff3f4;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo {
            color: #eff3f4;
        }

        /* タイトル */
        .title {
            font-size: 26px;
            font-weight: 700;
            margin-top: 20px;
            margin-bottom: 24px;
            letter-spacing: -0.5px;
        }

        /* 共通ボタンスタイル */
        .btn {
            width: 100%;
            height: 40px;
            border-radius: 9999px;
            font-size: 15px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: none;
            margin-bottom: 16px;
            text-decoration: none;
        }

        .btn svg {
            margin-right: 8px;
        }

        /* 各ボタンの固有スタイル */
        .btn-white {
            background-color: #ffffff;
            color: #0f1419;
        }

        .btn-next {
            background-color: #eff3f4;
            color: #0f1419;
            margin-top: 12px;
        }

        .btn-outline {
            background-color: transparent;
            color: #eff3f4;
            border: 1px solid #536471;
            margin-bottom: 40px;
        }
       

        /* 入力フォーム */
        .input-field {
            width: 100%;
            height: 56px;
            background-color: #000000;
            border: 1px solid #333639;
            border-radius: 4px;
            padding: 16px;
            color: #ffffff;
            font-size: 16px;
            outline: none;
        }

        .input-field:focus {
            border-color: #1d9bf0;
        }

        .input-field::placeholder {
            color: #71767b;
        }

        /* フッターテキスト */
        .footer-text {
            color: #71767b;
            font-size: 15px;
            line-height: 20px;
        }

        .footer-text a {
            color: #1d9bf0;
            text-decoration: none;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="header">
            <button class="close-btn">
                <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M10.59 12L4.54 5.96l1.42-1.42L12 10.59l6.04-6.05 1.42 1.42L13.41 12l6.05 6.04-1.42 1.42L12 13.41l-6.04 6.05-1.42-1.42L10.59 12z"/></svg>
            </button>
            <div class="logo">
                <svg viewBox="0 0 24 24" width="30" height="30" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
            </div>
        </div>

        <h1 class="title">Xにログイン</h1>
           

        <input type="text" class="input-field" placeholder="電話番号/メールアドレス/ユーザー名">

        <button class="btn btn-next">次へ</button>

        <button class="btn btn-outline">パスワードを忘れた場合はこちら</button>

        <p class="footer-text">アカウントをお持ちでない場合は<a href="#">登録</a></p>
    </div>

</body>
</html>
