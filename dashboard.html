<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHUMTOTO FIELD STATS</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0d080a 0%, #1a1014 50%, #0d080a 100%);
            --header-gradient: linear-gradient(180deg, #24141a 0%, rgba(36, 20, 26, 0.95) 100%);
            --color-chumtoto: #FF6B9D;
            --text-main: #f5f0f2;
            --text-muted: #9e8891;
            --card-bg: rgba(255, 107, 157, 0.05);
            --card-border: rgba(255, 107, 157, 0.2);
            --input-bg: rgba(0, 0, 0, 0.4);
        }

        body {
            margin: 0;
            font-family: 'Hiragino Kaku Gothic ProN', 'Yu Gothic', sans-serif;
            background: var(--bg-gradient);
            color: var(--text-main);
            min-height: 100vh;
            padding-bottom: 90px;
        }

        header {
            background: var(--header-gradient);
            border-bottom: 1px solid rgba(255, 107, 157, 0.15);
            padding: 16px 20px 12px;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(12px);
            text-align: center;
        }

        h2 { margin: 0; font-size: 18px; font-weight: 700; letter-spacing: 2px; color: #fff; text-shadow: 0 0 8px rgba(255, 107, 157, 0.4); }
        .container { max-width: 600px; margin: 0 auto; padding: 16px; box-sizing: border-box; }
        
        /* フィルターコントロールエリア */
        .filter-container {
            background: rgba(0,0,0,0.2);
            border: 1px solid var(--card-border);
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 16px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .filter-tabs { display: flex; background: var(--input-bg); padding: 2px; border-radius: 8px; }
        .tab-btn { flex: 1; padding: 8px 0; background: transparent; border: none; color: var(--text-muted); font-size: 12px; font-weight: bold; cursor: pointer; border-radius: 6px; transition: all 0.2s; }
        .tab-btn.active { background: rgba(255, 107, 157, 0.2); color: #fff; text-shadow: 0 0 4px var(--color-chumtoto); }

        .select-group { display: flex; gap: 10px; }
        .filter-select {
            flex: 1;
            background: var(--input-bg);
            border: 1px solid var(--card-border);
            color: #fff;
            padding: 10px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: bold;
            outline: none;
            cursor: pointer;
            transition: 0.2s;
        }
        .filter-select:disabled { opacity: 0.2; cursor: not-allowed; }
        .filter-select:focus { border-color: var(--color-chumtoto); }

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
        .stats-card { background: var(--card-bg); border: 1px solid var(--card-border); padding: 16px; border-radius: 12px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .stats-card.full { grid-column: span 2; background: linear-gradient(135deg, rgba(255,107,157,0.12) 0%, rgba(255,255,255,0.01) 100%); border-color: rgba(255, 107, 157, 0.4); }
        .stats-label { font-size: 11px; color: var(--text-muted); font-weight: bold; letter-spacing: 1px; margin-bottom: 6px; text-transform: uppercase; }
        .stats-value { font-size: 22px; font-weight: 800; color: #fff; }
        .stats-card.full .stats-value { font-size: 32px; color: var(--color-chumtoto); text-shadow: 0 0 10px rgba(255,107,157,0.4); }

        .chart-box { background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 12px; padding: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .loading { text-align: center; color: var(--color-chumtoto); padding: 40px; font-weight: bold; letter-spacing: 2px; text-shadow: 0 0 6px rgba(255,107,157,0.3); }

        /* 下部ナビゲーション */
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: var(--header-gradient); border-top: 1px solid rgba(255, 107, 157, 0.15); display: flex; justify-content: space-around; padding: 10px 0; z-index: 100; backdrop-filter: blur(12px); }
        .bottom-nav a { color: var(--text-muted); text-decoration: none; font-size: 10px; text-align: center; display: flex; flex-direction: column; gap: 4px; font-weight: bold; transition: color 0.2s; }
        .bottom-nav a.active { color: var(--color-chumtoto); }
    </style>
</head>
<body>

<header>
    <h2>📊 FIELD STATS</h2>
</header>

<div class="container">
    <div class="filter-container">
        <div class="filter-tabs">
            <button class="tab-btn active" id="tab-all" onclick="setMode('all')">全期間</button>
            <button class="tab-btn" id="tab-year" onclick="setMode('year')">年別表示</button>
            <button class="tab-btn" id="tab-month" onclick="setMode('month')">月別表示</button>
        </div>
        
        <div class="select-group">
            <select id="year-select" class="filter-select" onchange="onChangeFilter()" disabled>
                <option value="">-- 年を選択 --</option>
            </select>
            <select id="month-select" class="filter-select" onchange="onChangeFilter()" disabled>
                <option value="">-- 月を選択 --</option>
            </select>
        </div>
    </div>

    <div class="stats-grid">
        <div class="stats-card full">
            <div class="stats-label" id="main-expense-label">Total Investment (累計支出)</div>
            <div class="stats-value" id="total-main">¥0</div>
        </div>
        <div class="stats-card">
            <div class="stats-label">Ticket Total (チケット代)</div>
            <div class="stats-value" id="total-ticket">¥0</div>
        </div>
        <div class="stats-card">
            <div class="stats-label">Attendance Rate (参戦率)</div>
            <div class="stats-value" id="attendance-rate">0%</div>
        </div>
    </div>

    <div class="chart-box">
        <h3 id="chart-title" style="font-size: 12px; color: var(--text-main); margin-top: 0; margin-bottom: 15px; letter-spacing: 1px;">月別支出推移 (¥)</h3>
        <div id="loading-text" class="loading">ANALYZING FINANCIAL DATA...</div>
        <canvas id="expenseChart" style="display: none;"></canvas>
    </div>
</div>

<div class="bottom-nav">
    <a href="calendar.html"><span>📅</span>CALENDAR</a>
    <a href="dashboard.html" class="active"><span>📊</span>STATS</a>
    <a href="index.html"><span>✍️</span>ENTRY</a>
</div>

<script>
// ★重要：ご自身のデプロイ版GASウェブアプリURL
const GAS_URL = 'https://script.google.com/macros/s/AKfycbw7KeuN0XckEqU9V4wRxR3O8T9Rl6cC2jQesEOpOsNJTF09ZylpVFZWJnqo0aff1YNFRw/exec';

const PRICES = { sign_cheki: 3000, white_cheki: 2000, tiktok: 3500, kakomi: 4000, item_sign: 4500, omiyokuri: 1500 };

let rawData = [];      // GASから取得した生の全履歴データ
let currentChart = null; // Chart.jsインスタンス
let currentMode = 'all'; // 'all', 'year', 'month'

window.onload = async function() {
    try {
        const response = await fetch(GAS_URL + "?action=read_history");
        const resData = await response.json();
        if (resData.result === "success") {
            rawData = resData.data;
            document.getElementById('loading-text').style.display = 'none';
            document.getElementById('expenseChart').style.display = 'block';
            
            buildFilterOptions(); // データから年・月のドロップダウンを動的生成
            renderDashboard();   // 初期表示
        }
    } catch (e) {
        document.getElementById('loading-text').innerText = "ERROR: FAILED TO LOAD DATA";
    }
}

// スプシのデータから自動的に年・月の選択肢を作る
function buildFilterOptions() {
    const years = new Set();
    const months = new Set();

    rawData.forEach(row => {
        if (!row.date) return;
        const y = row.date.substring(0, 4);
        const m = row.date.substring(0, 7); // "2026-05"
        years.add(y);
        months.add(m);
    });

    // 年セレクトボックス生成
    const yearSelect = document.getElementById('year-select');
    Array.from(years).sort().reverse().forEach(y => {
        const opt = document.createElement('option');
        opt.value = y;
        opt.innerText = `${y}年`;
        yearSelect.appendChild(opt);
    });

    // 月セレクトボックス生成
    const monthSelect = document.getElementById('month-select');
    Array.from(months).sort().reverse().forEach(m => {
        const opt = document.createElement('option');
        opt.value = m;
        // 表示用に "2026年05月" に整形
        const [yStr, mStr] = m.split('-');
        opt.innerText = `${yStr}年${mStr}月`;
        monthSelect.appendChild(opt);
    });
}

// タブを切り替えたとき
function setMode(mode) {
    currentMode = mode;
    
    // アクティブなタブデザインの切り替え
    document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
    document.getElementById(`tab-${mode}`).classList.add('active');

    // モードに応じてドロップダウンの有効・無効をコントロール
    const yearSelect = document.getElementById('year-select');
    const monthSelect = document.getElementById('month-select');

    if (mode === 'all') {
        yearSelect.disabled = true;
        monthSelect.disabled = true;
    } else if (mode === 'year') {
        yearSelect.disabled = false;
        monthSelect.disabled = true;
        // 未選択なら一番新しい年を自動選択
        if (!yearSelect.value && yearSelect.options.length > 1) {
            yearSelect.selectedIndex = 1;
        }
    } else if (mode === 'month') {
        yearSelect.disabled = true;
        monthSelect.disabled = false;
        // 未選択なら一番新しい月を自動選択
        if (!monthSelect.value && monthSelect.options.length > 1) {
            monthSelect.selectedIndex = 1;
        }
    }

    renderDashboard();
}

// ドロップダウンを変更したとき
function onChangeFilter() {
    renderDashboard();
}

function renderDashboard() {
    const yearSelect = document.getElementById('year-select');
    const monthSelect = document.getElementById('month-select');

    // 1. データのフィルタリング
    const filteredData = rawData.filter(row => {
        if (!row.date) return false;
        if (currentMode === 'year') {
            return yearSelect.value ? row.date.substring(0, 4) === yearSelect.value : true;
        } else if (currentMode === 'month') {
            return monthSelect.value ? row.date.substring(0, 7) === monthSelect.value : true;
        }
        return true; // 'all'
    });

    // 2. 集計処理
    let totalExpense = 0;
    let totalTicket = 0;
    let attendCount = 0;
    let totalCount = filteredData.length;
    const monthlyData = {};

    filteredData.forEach(row => {
        if (row.attendance === "参加") attendCount++;

        let ticketFee = parseInt(row.ticket_fee) || 0;
        totalTicket += ticketFee;

        let rowTotal = ticketFee;
        Object.keys(PRICES).forEach(key => {
            let count = parseInt(row[key]) || 0;
            rowTotal += count * PRICES[key];
        });

        totalExpense += rowTotal;

        const monthKey = row.date.substring(0, 7);
        monthlyData[monthKey] = (monthlyData[monthKey] || 0) + rowTotal;
    });

    // 3. 上部のカード情報を更新
    if (currentMode === 'all') {
        document.getElementById('main-expense-label').innerText = 'Total Investment (累計支出)';
    } else if (currentMode === 'year') {
        document.getElementById('main-expense-label').innerText = `${yearSelect.value || ''}年の年間支出`;
    } else if (currentMode === 'month') {
        const mVal = monthSelect.value;
        const displayMonth = mVal ? `${mVal.split('-')[0]}年${mVal.split('-')[1]}月` : '';
        document.getElementById('main-expense-label').innerText = `${displayMonth}の月間支出`;
    }

    document.getElementById('total-main').innerText = `¥${totalExpense.toLocaleString()}`;
    document.getElementById('total-ticket').innerText = `¥${totalTicket.toLocaleString()}`;
    document.getElementById('attendance-rate').innerText = totalCount > 0 ? `${Math.round((attendCount / totalCount) * 100)}%` : "0%";

    // 4. グラフの分岐描画
    if (currentMode === 'month') {
        document.getElementById('chart-title').innerText = "選択月の支出内訳 (¥)";
        renderBreakdownChart(filteredData);
    } else {
        const labels = Object.keys(monthlyData).sort();
        const chartValues = labels.map(key => monthlyData[key]);
        document.getElementById('chart-title').innerText = currentMode === 'year' ? "選択年の月別支出推移 (¥)" : "全期間の月別支出推移 (¥)";
        renderTrendChart(labels, chartValues);
    }
}

// 【グラフA】棒グラフ（全期間・年別）
function renderTrendChart(labels, values) {
    if (currentChart) currentChart.destroy();

    const ctx = document.getElementById('expenseChart').getContext('2d');
    currentChart = new Chart(ctx, {
        type: 'bar',
        data: {
            labels: labels,
            datasets: [{
                label: '支出合計',
                data: values,
                backgroundColor: '#FF6B9D',
                borderRadius: 6,
                borderWidth: 0
            }]
        },
        options: {
            responsive: true,
            plugins: {
                legend: { labels: { color: '#f5f0f2', font: { weight: 'bold' } } }
            },
            scales: {
                x: { grid: { color: 'rgba(255, 107, 157, 0.05)' }, ticks: { color: '#9e8891' } },
                y: { beginAtZero: true, grid: { color: 'rgba(255, 107, 157, 0.1)' }, ticks: { color: '#9e8891' } }
            }
        }
    });
}

// 【グラフB】ドーナツグラフ（月別選択時専用）
function renderBreakdownChart(monthData) {
    if (currentChart) currentChart.destroy();

    let ticketSum = 0;
    let benefitSum = 0;

    monthData.forEach(row => {
        ticketSum += parseInt(row.ticket_fee) || 0;
        Object.keys(PRICES).forEach(key => {
            benefitSum += (parseInt(row[key]) || 0) * PRICES[key];
        });
    });

    const ctx = document.getElementById('expenseChart').getContext('2d');
    currentChart = new Chart(ctx, {
        type: 'doughnut',
        data: {
            labels: ['チケット代', '特典会合計'],
            datasets: [{
                data: [ticketSum, benefitSum],
                backgroundColor: ['#6ba3ff', '#FF6B9D'],
                borderWidth: 0
            }]
        },
        options: {
            responsive: true,
            plugins: {
                legend: { labels: { color: '#f5f0f2', font: { weight: 'bold' } } }
            }
        }
    });
}
</script>
</body>
</html>
