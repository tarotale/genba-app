<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>ChumToto Field Stats</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <link rel="apple-touch-icon" href="icon.png">

    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0d080a 0%, #1a1014 50%, #0d080a 100%);
            --header-gradient: linear-gradient(180deg, #24141a 0%, rgba(36, 20, 26, 0.95) 100%);
            --color-chumtoto: #FF6B9D;
            --color-success: #4CD964;
            --color-warn: #FF3B30;
            --text-main: #f5f0f2;
            --text-muted: #9e8891;
            --card-bg: rgba(255, 107, 157, 0.04);
            --card-border: rgba(255, 107, 157, 0.15);
        }

        html { background: #0d080a; }
        body {
            margin: 0;
            font-family: 'Hiragino Kaku Gothic ProN', 'Yu Gothic', sans-serif;
            background: var(--bg-gradient);
            color: var(--text-main);
            min-height: 100vh;
            padding-bottom: 100px;
        }

        /* ヘッダー配置 */
        header {
            background: var(--header-gradient);
            border-bottom: 1px solid rgba(255, 107, 157, 0.15);
            padding: 10px 16px;
            padding-top: calc(10px + env(safe-area-inset-top));
            display: flex;
            align-items: center;
            justify-content: space-between;
            backdrop-filter: blur(12px);
            position: sticky;
            top: 0;
            z-index: 100;
            min-height: 38px;
            box-sizing: border-box;
            gap: 10px;
        }

        .back-portal-btn {
            color: var(--color-chumtoto);
            text-decoration: none;
            font-size: 11px;
            font-weight: bold;
            border: 1px solid rgba(255, 107, 157, 0.3);
            padding: 5px 8px;
            border-radius: 6px;
            background: rgba(255, 107, 157, 0.05);
            transition: 0.2s;
            white-space: nowrap;
            flex-shrink: 0;
        }
        .back-portal-btn:hover {
            background: rgba(255, 107, 157, 0.15);
        }

        header h1 {
            margin: 0;
            font-size: 13px;
            font-weight: 800;
            letter-spacing: 0.5px;
            color: #fff;
            text-shadow: 0 0 8px rgba(255, 107, 157, 0.4);
            flex: 1;
            text-align: right;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
            padding: 16px;
            box-sizing: border-box;
        }

        /* 期間切り替えセレクター・タブエリア */
        .filter-area {
            display: flex;
            gap: 8px;
            margin-bottom: 14px;
        }
        .filter-select {
            flex: 1;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 107, 157, 0.25);
            border-radius: 6px;
            padding: 8px;
            color: #fff;
            font-size: 12px;
        }

        /* 横スクロール月別棒グラフのスタイル */
        .monthly-chart-scroll-box {
            display: flex;
            gap: 14px;
            overflow-x: auto;
            padding: 20px 14px 10px 14px;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 14px;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            align-items: flex-end;
            min-height: 130px;
            -webkit-overflow-scrolling: touch;
        }
        .chart-bar-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex-shrink: 0;
            width: 55px;
        }
        .chart-value {
            font-size: 9px;
            color: #fff;
            font-weight: bold;
            margin-bottom: 6px;
            white-space: nowrap;
        }
        .chart-bar {
            width: 26px;
            background: linear-gradient(180deg, var(--color-chumtoto) 0%, rgba(255, 107, 157, 0.2) 100%);
            border-radius: 4px 4px 0 0;
            box-shadow: 0 0 10px rgba(255, 107, 157, 0.3);
            transition: height 0.4s ease;
        }
        .chart-label {
            font-size: 10px;
            color: var(--text-muted);
            font-weight: bold;
            margin-top: 8px;
            white-space: nowrap;
        }

        /* サマリーダッシュボード */
        .stats-summary {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 14px;
            padding: 16px;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .stats-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255,107,157,0.08);
            font-size: 13px;
        }
        .stats-row:last-child { border: none; }
        .stats-label { color: var(--text-muted); font-weight: bold; }
        
        .stats-value-box {
            text-align: right;
        }
        .stats-value { font-weight: 900; color: #fff; }
        
        .stats-sub-value {
            font-size: 10px;
            color: var(--text-muted);
            font-weight: bold;
            margin-top: 2px;
        }

        .section-title {
            font-size: 12px;
            font-weight: bold;
            color: var(--text-muted);
            margin: 20px 0 10px 0;
            letter-spacing: 1px;
        }

        .att-filter-bar {
            display: flex;
            gap: 8px;
            margin-bottom: 14px;
        }
        .att-filter-btn {
            flex: 1;
            background: rgba(255, 107, 157, 0.06);
            color: var(--text-muted);
            border: 1px solid var(--card-border);
            border-radius: 8px;
            padding: 9px 0;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.15s;
        }
        .att-filter-btn.active {
            background: var(--color-chumtoto);
            color: #fff;
            border-color: var(--color-chumtoto);
        }

        .history-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* 履歴カード */
        .history-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            padding: 14px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            position: relative;
        }

        .card-header-line {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
        }

        .card-date {
            font-size: 11px;
            font-weight: bold;
            color: var(--text-muted);
        }

        .status-badge {
            font-size: 9px;
            font-weight: bold;
            padding: 3px 6px;
            border-radius: 4px;
            white-space: nowrap;
        }
        .status-badge.attend { background: rgba(76, 217, 100, 0.15); color: var(--color-success); border: 1px solid rgba(76, 217, 100, 0.3); }
        .status-badge.absent { background: rgba(255, 59, 48, 0.15); color: var(--color-warn); border: 1px solid rgba(255, 59, 48, 0.3); }

        .card-title {
            font-size: 13px;
            font-weight: bold;
            color: #fff;
            line-height: 1.4;
            margin-bottom: 8px;
        }

        .card-details-box {
            display: flex;
            flex-direction: column;
            gap: 4px;
            border-top: 1px solid rgba(255, 107, 157, 0.08);
            padding-top: 6px;
            margin-bottom: 6px;
        }

        .card-detail-item {
            font-size: 11px;
            color: var(--text-muted);
            font-weight: 500;
        }

        .edit-link {
            display: inline-flex;
            align-items: center;
            font-size: 11px;
            color: var(--color-chumtoto);
            text-decoration: none;
            font-weight: bold;
            margin-top: 2px;
        }
        .edit-link:hover { text-decoration: underline; }

        /* ボトムナビゲーションバー */
        .nav-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(19, 11, 14, 0.92);
            border-top: 1px solid rgba(255, 107, 157, 0.1);
            display: flex;
            padding: 6px 0;
            padding-bottom: calc(6px + env(safe-area-inset-bottom));
            backdrop-filter: blur(10px);
            z-index: 100;
        }

        .nav-item {
            flex: 1;
            text-align: center;
            text-decoration: none;
            color: var(--text-muted);
            font-size: 10px;
            font-weight: bold;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .nav-item.active { color: var(--color-chumtoto); }
        .nav-icon { font-size: 18px; }

        .loading-cover {
            text-align: center;
            color: var(--color-chumtoto);
            font-weight: bold;
            padding: 40px;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

<header>
    <a href="index.html" class="back-portal-btn">◀ Portal</a>
    <h1>ChumToto Field Stats</h1>
</header>

<div class="container">
    
    <div id="loading-msg" class="loading-cover">Analyzing Financial Records...</div>

    <div id="stats-content-area" style="display: none;">
        
        <div class="section-title">Filter Period</div>
        <div class="filter-area">
            <select id="period-type-select" class="filter-control filter-select" onchange="onPeriodTypeChange()">
                <option value="all">全期間通算 (All Time)</option>
                <option value="year">年別集計 (Yearly)</option>
                <option value="month">月別集計 (Monthly)</option>
            </select>
            <select id="period-value-select" class="filter-control filter-select" style="display: none;" onchange="onPeriodValueChange()">
            </select>
        </div>

        <div class="section-title">Monthly Expense Trend</div>
        <div class="monthly-chart-scroll-box" id="monthly-chart-container"></div>

        <div class="section-title">Field Summary Dashboard</div>
        <div class="stats-summary">
            <div class="stats-row"><div class="stats-label">Total Expense</div><div class="stats-value" id="stat-total-expense">¥0</div></div>
            <div class="stats-row"><div class="stats-label">Ticket Fees</div><div class="stats-value" id="stat-total-ticket">¥0</div></div>
            <div class="stats-row"><div class="stats-label">Cheki Expenses</div><div class="stats-value" id="stat-total-cheki-cost">¥0</div></div>
            
            <div class="stats-row" style="flex-direction: column; align-items: stretch;">
                <div class="stats-label" style="margin-bottom: 12px;">特典会 内訳</div>
                <div id="tokuten-breakdown-list" style="display: flex; flex-direction: column; gap: 8px;"></div>
            </div>
            
            <div class="stats-row">
                <div class="stats-label">Attendance Rate</div>
                <div class="stats-value-box">
                    <div class="stats-value" id="stat-attendance-rate">0%</div>
                    <div class="stats-sub-value" id="stat-attendance-detail">全 0 現場 / 参戦 0</div>
                </div>
            </div>
        </div>

        <div class="section-title">参戦履歴一覧</div>
        <div class="att-filter-bar">
            <button class="att-filter-btn active" data-att="all" onclick="setAttendanceFilter('all')">すべて</button>
            <button class="att-filter-btn" data-att="参戦" onclick="setAttendanceFilter('参戦')">参戦</button>
            <button class="att-filter-btn" data-att="不参戦" onclick="setAttendanceFilter('不参戦')">不参戦</button>
        </div>
        <div class="history-list" id="history-render-target"></div>
    </div>

</div>

<nav class="nav-bar">
    <a href="calendar.html" class="nav-item"><span class="nav-icon">📅</span>Schedule</a>
    <a href="dashboard.html" class="nav-item active"><span class="nav-icon">📊</span>Stats</a>
    <a href="entry.html" class="nav-item"><span class="nav-icon">✍️</span>Entry</a>
</nav>

<script>
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbw7KeuN0XckEqU9V4wRxR3O8T9Rl6cC2jQesEOpOsNJTF09ZylpVFZWJnqo0aff1YNFRw/exec';
    const PRICES = { sign_cheki: 3000, white_cheki: 2000, twoshot: 3000, tiktok: 3500, kakomi: 4000, kakomi_shame: 5000, item_sign: 4500, omiyokuri: 1500 };

    let globalRawData = []; 

    window.onload = async function() {
        try {
            const response = await fetch(GAS_URL + "?action=read_history");
            const res = await response.json();
            if (res.result === "success") {
                document.getElementById('loading-msg').style.display = 'none';
                document.getElementById('stats-content-area').style.display = 'block';
                
                globalRawData = res.data;
                initPeriodFilters(); 
                applyFilterAndRender();
            }
        } catch(e) {
            document.getElementById('loading-msg').innerText = "Failed To Data Sync";
        }
    }

    function initPeriodFilters() {
        const typeSelect = document.getElementById('period-type-select');
        const valSelect = document.getElementById('period-value-select');
        typeSelect.value = "all";
        valSelect.style.display = "none";
    }

    function onPeriodTypeChange() {
        const type = document.getElementById('period-type-select').value;
        const valSelect = document.getElementById('period-value-select');
        
        if (type === 'all') {
            valSelect.style.display = "none";
            applyFilterAndRender();
            return;
        }

        const set = new Set();
        globalRawData.forEach(row => {
            if (!row.date) return;
            if (type === 'year') {
                set.add(row.date.substring(0, 4)); 
            } else if (type === 'month') {
                set.add(row.date.substring(0, 7)); 
            }
        });

        const sortedPeriods = Array.from(set).sort((a, b) => b.localeCompare(a));
        
        valSelect.innerHTML = '';
        sortedPeriods.forEach(p => {
            const opt = document.createElement('option');
            opt.value = p;
            opt.innerText = type === 'year' ? `${p}年` : `${p.replace('-', '年')}月`;
            valSelect.appendChild(opt);
        });

        valSelect.style.display = "block";
        applyFilterAndRender();
    }

    function onPeriodValueChange() {
        applyFilterAndRender();
    }

    // 🆕 参戦/不参戦の絞り込み状態（履歴一覧のみに作用。集計値は期間フィルタのまま）
    let attendanceFilter = 'all';
    function setAttendanceFilter(val) {
        attendanceFilter = val;
        document.querySelectorAll('.att-filter-btn').forEach(b => {
            b.classList.toggle('active', b.dataset.att === val);
        });
        applyFilterAndRender();
    }

    function applyFilterAndRender() {
        const type = document.getElementById('period-type-select').value;
        const val = document.getElementById('period-value-select').value;

        let filteredData = globalRawData;

        if (type === 'year' && val) {
            filteredData = globalRawData.filter(row => row.date && row.date.startsWith(val));
        } else if (type === 'month' && val) {
            filteredData = globalRawData.filter(row => row.date && row.date.startsWith(val));
        }

        processAndRenderStats(filteredData);
    }

    function processAndRenderStats(historyData) {
        let totalExpense = 0;
        let totalTicket = 0;
        let totalChekiCost = 0;
        let totalChekiCount = 0;
        let attendCount = 0;

        let dashboardSignChekiSum = 0;
        let dashboardWhiteChekiSum = 0;

        // 🆕 全特典会の種類別累計（チェキ以外も含めて内訳表示する）
        const TOKUTEN_LABELS = {
            sign_cheki: "サイン", white_cheki: "白", twoshot: "ツーショット",
            tiktok: "TikTok", kakomi: "囲み写メ(4000)", kakomi_shame: "囲み写メ(5000)",
            item_sign: "私物サイン", omiyokuri: "お見送り"
        };
        const CHEKI_PHOTO_KEYS = ["sign_cheki", "white_cheki", "twoshot", "tiktok", "kakomi", "kakomi_shame"];
        const tokutenSums = {};
        Object.keys(TOKUTEN_LABELS).forEach(k => tokutenSums[k] = 0);

        const monthlyAggregation = {};
        const sortedData = [...historyData].sort((a, b) => (b.date || '').localeCompare(a.date || ''));
        const listTarget = document.getElementById('history-render-target');
        
        // パフォーマンス対策：HTML文字列を一括生成するための配列
        const cardsHtmlArray = [];

        sortedData.forEach(row => {
            let ticket = parseInt(row.ticket_fee) || 0;
            let chekiCost = 0;
            
            let sCount = parseInt(row.sign_cheki) || 0;
            let wCount = parseInt(row.white_cheki) || 0;
            let chekis = CHEKI_PHOTO_KEYS.reduce((s, k) => s + (parseInt(row[k]) || 0), 0);

            dashboardSignChekiSum += sCount;
            dashboardWhiteChekiSum += wCount;

            // 🆕 種類別の累計を加算
            Object.keys(TOKUTEN_LABELS).forEach(k => { tokutenSums[k] += parseInt(row[k]) || 0; });

            Object.keys(PRICES).forEach(k => {
                let cnt = parseInt(row[k]) || 0;
                chekiCost += cnt * PRICES[k];
            });

            let rowTotal = ticket + chekiCost;

            totalExpense += rowTotal;
            totalTicket += ticket;
            totalChekiCost += chekiCost;
            totalChekiCount += chekis;

            const isAttend = (row.attendance === "参戦" || row.attendance === "参加");
            if (isAttend) {
                attendCount++;
            }

            if (row.date && row.date.length >= 7) {
                const monthKey = row.date.substring(0, 7);
                monthlyAggregation[monthKey] = (monthlyAggregation[monthKey] || 0) + rowTotal;
            }

            const badgeClass = isAttend ? "status-badge attend" : "status-badge absent";
            const badgeText = row.attendance || "未判定";
            const venueHtml = row.venue ? `<div class="card-detail-item">🏢 会場: ${row.venue}</div>` : `<div class="card-detail-item">🏢 会場: 未記録</div>`;

            const cardHtml = `
                <div class="history-card">
                    <div class="card-header-line">
                        <div class="card-date">📅 ${row.date || '日付未詳'}</div>
                        <span class="${badgeClass}">${badgeText}</span>
                    </div>
                    <div class="card-title">${row.event_name || '名称未記録'}</div>
                    <div class="card-details-box">
                        ${venueHtml}
                        <div class="card-detail-item">💰 決済額: ¥${rowTotal.toLocaleString()} (チケット: ¥${ticket.toLocaleString()})</div>
                        <div class="card-detail-item">📸 サイン: ${sCount}枚 / 白: ${wCount}枚</div>
                    </div>
                    <a href="entry.html?mode=edit&row_index=${row.row_index}&date=${row.date}&event=${encodeURIComponent(row.event_name || '')}&location=${encodeURIComponent(row.venue || row.location || '')}&attendance=${encodeURIComponent(row.attendance || '')}&ticket_fee=${row.ticket_fee || 0}&sign_cheki=${row.sign_cheki || 0}&white_cheki=${row.white_cheki || 0}&twoshot=${row.twoshot || 0}&tiktok=${row.tiktok || 0}&kakomi=${row.kakomi || 0}&kakomi_shame=${row.kakomi_shame || 0}&item_sign=${row.item_sign || 0}&omiyokuri=${row.omiyokuri || 0}" class="edit-link">✏️ データを修正する</a>
                </div>
            `;
            // 🆕 参戦/不参戦フィルタに合致する記録だけ一覧に表示（集計値には全件反映済み）
            const matchesFilter = (attendanceFilter === 'all')
                || (attendanceFilter === '参戦' && isAttend)
                || (attendanceFilter === '不参戦' && !isAttend);
            if (matchesFilter) cardsHtmlArray.push(cardHtml);
        });

        // DOMへ一括流し込み
        listTarget.innerHTML = cardsHtmlArray.join('');

        // ダッシュボード更新
        const ratePercent = historyData.length > 0 ? Math.round((attendCount / historyData.length) * 100) : 0;
        document.getElementById('stat-total-expense').innerText = `¥${totalExpense.toLocaleString()}`;
        document.getElementById('stat-total-ticket').innerText = `¥${totalTicket.toLocaleString()}`;
        document.getElementById('stat-total-cheki-cost').innerText = `¥${totalChekiCost.toLocaleString()}`;
        // 🆕 特典会の種類別累計を縦並びで表示（全種類を常時表示）
        const breakdownRows = Object.keys(TOKUTEN_LABELS).map(k => `
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <span style="color: var(--text-muted); font-size: 13px;">${TOKUTEN_LABELS[k]}</span>
                <span style="color: var(--text-main); font-size: 15px; font-weight: 700;">${tokutenSums[k]}<span style="font-size:11px; color: var(--text-muted); font-weight:400;"> 枚</span></span>
            </div>
        `).join('');
        document.getElementById('tokuten-breakdown-list').innerHTML = breakdownRows;
        document.getElementById('stat-attendance-rate').innerText = `${ratePercent}%`;
        // 🆕 現場数・参戦数の実数も表示
        document.getElementById('stat-attendance-detail').innerText = `全 ${historyData.length} 現場 / 参戦 ${attendCount}`;

        renderMonthlyChart(monthlyAggregation);
    }

    function renderMonthlyChart(chartDataMap) {
        const chartContainer = document.getElementById('monthly-chart-container');
        chartContainer.innerHTML = '';

        const months = Object.keys(chartDataMap).sort((a, b) => a.localeCompare(b));

        if (months.length === 0) {
            chartContainer.innerHTML = '<div style="color:var(--text-muted); font-size:11px; padding:20px; width:100%; text-align:center;">推移データがありません</div>';
            return;
        }

        const maxVal = Math.max(...Object.values(chartDataMap), 1);
        const maxBarHeight = 70;

        const barsHtmlArray = months.map(m => {
            const amount = chartDataMap[m];
            const calculatedHeight = Math.max(Math.round((amount / maxVal) * maxBarHeight), 5);
            const shortLabel = m.substring(2).replace('-', '/');

            return `
                <div class="chart-bar-wrapper">
                    <div class="chart-value">¥${amount.toLocaleString()}</div>
                    <div class="chart-bar" style="height: ${calculatedHeight}px;"></div>
                    <div class="chart-label">${shortLabel}</div>
                </div>
            `;
        });

        chartContainer.innerHTML = barsHtmlArray.join('');

        setTimeout(() => {
            chartContainer.scrollLeft = chartContainer.scrollWidth;
        }, 100);
    }

    // 【PWA特効薬】iOSホーム画面起動時に通常ブラウザ（Safari）へ飛ばされるのを完全に防ぐ
    if (window.navigator.standalone) {
        document.addEventListener('click', function(event) {
            var a = event.target.closest('a');
            if (a && a.href && a.host === location.host) {
                event.preventDefault();
                window.location.href = a.href;
            }
        }, false);
    }
</script>
</body>
</html>
