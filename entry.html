<!DOCTYPE html>
<html lang="ja">
<head>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ChumToto - New Field Entry</title>
    
    <link rel="apple-touch-icon" href="icon.png">

    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0d080a 0%, #1a1014 50%, #0d080a 100%);
            --header-gradient: linear-gradient(180deg, #24141a 0%, rgba(36, 20, 26, 0.95) 100%);
            --color-chumtoto: #FF6B9D;
            --text-main: #f5f0f2;
            --text-muted: #9e8891;
            --card-bg: rgba(255, 107, 157, 0.04);
            --card-border: rgba(255, 107, 157, 0.15);
            --input-bg: rgba(0, 0, 0, 0.4);
        }

        body {
            margin: 0;
            font-family: 'Hiragino Kaku Gothic ProN', 'Yu Gothic', sans-serif;
            background: var(--bg-gradient);
            color: var(--text-main);
            min-height: 100vh;
            padding-bottom: 100px;
        }

        /* ヘッダー配置 */
        header {
            background: var(--header-gradient);
            border-bottom: 1px solid rgba(255, 107, 157, 0.15);
            padding: 10px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            backdrop-filter: blur(12px);
            position: sticky;
            top: 0;
            z-index: 100;
            height: 38px;
            box-sizing: border-box;
            gap: 10px;
        }

        .back-portal-btn {
            color: var(--color-chumtoto);
            text-decoration: none;
            font-size: 11px;
            font-weight: bold;
            border: 1px solid rgba(255, 107, 157, 0.3);
            padding: 5px 8px;
            border-radius: 6px;
            background: rgba(255, 107, 157, 0.05);
            transition: 0.2s;
            white-space: nowrap;
            flex-shrink: 0;
        }
        .back-portal-btn:hover {
            background: rgba(255, 107, 157, 0.15);
        }

        header h1 {
            margin: 0;
            font-size: 13px;
            font-weight: 800;
            letter-spacing: 0.5px;
            color: #fff;
            text-shadow: 0 0 8px rgba(255, 107, 157, 0.4);
            flex: 1;
            text-align: right;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
            padding: 16px;
            box-sizing: border-box;
        }

        .form-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 14px;
            padding: 20px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
            box-sizing: border-box;
        }

        /* 参戦トグルエリア */
        .toggle-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            background: rgba(0,0,0,0.2);
            padding: 12px 16px;
            border-radius: 10px;
            border: 1px solid rgba(255,107,157,0.08);
        }
        .toggle-label { font-size: 13px; font-weight: bold; }
        
        .switch { position: relative; display: inline-block; width: 46px; height: 26px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #44353b; transition: .3s; border-radius: 26px; }
        .slider:before { position: absolute; content: ""; height: 20px; width: 20px; left: 3px; bottom: 3px; background-color: white; transition: .3s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--color-chumtoto); }
        input:checked + .slider:before { transform: translateX(20px); }

        .form-group {
            margin-bottom: 18px;
            box-sizing: border-box;
            width: 100%;
        }

        .form-group label {
            display: block;
            font-size: 11px;
            font-weight: bold;
            color: var(--text-muted);
            margin-bottom: 6px;
            letter-spacing: 0.5px;
        }

        /* 💡 フォームコントロール共通設定 */
        .form-control {
            width: 100%;
            background: var(--input-bg);
            border: 1px solid rgba(255, 107, 157, 0.25);
            border-radius: 8px;
            padding: 12px;
            color: #fff;
            font-size: 13px;
            box-sizing: border-box;
            font-family: inherit;
            transition: 0.2s;
        }
        .form-control:focus {
            outline: none;
            border-color: var(--color-chumtoto);
            box-shadow: 0 0 8px rgba(255, 107, 157, 0.2);
        }

        /* 💡 iOSのSafari/LINE内ブラウザでdate入力欄が突き抜けるバグの完全修正 */
        input[type="date"].form-control {
            -webkit-appearance: none; /* iOS標準のスタイル干渉をリセット */
            max-width: 100%;          /* 親要素(カード)からはみ出すのを絶対に防ぐ */
            min-width: 0;             /* ブラウザ既定の最小幅による押し出しを無効化 */
        }

        /* 特典会オプションセクション */
        .sub-section-title {
            font-size: 11px;
            font-weight: bold;
            color: var(--color-chumtoto);
            margin: 24px 0 12px 0;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .option-counter-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255, 107, 157, 0.05);
        }
        .option-name { font-size: 13px; font-weight: 500; }
        
        .counter-controls {
            display: flex;
            align-items: center;
            gap: 14px;
        }
        .counter-btn {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: rgba(255, 107, 157, 0.1);
            border: 1px solid rgba(255, 107, 157, 0.3);
            color: var(--color-chumtoto);
            font-size: 16px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            user-select: none;
        }
        .counter-btn:active { background: rgba(255, 107, 157, 0.25); }
        .counter-val { font-size: 14px; font-weight: bold; width: 20px; text-align: center; }

        .submit-btn {
            width: 100%;
            background: var(--color-chumtoto);
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 14px;
            font-size: 14px;
            font-weight: bold;
            margin-top: 24px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 107, 157, 0.3);
            transition: 0.2s;
        }
        .submit-btn:active { transform: scale(0.98); opacity: 0.9; }

        /* ボトムナビゲーションバー */
        .nav-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(19, 11, 14, 0.92);
            border-top: 1px solid rgba(255, 107, 157, 0.1);
            display: flex;
            padding: 6px 0;
            backdrop-filter: blur(10px);
            z-index: 100;
        }

        .nav-item {
            flex: 1;
            text-align: center;
            text-decoration: none;
            color: var(--text-muted);
            font-size: 10px;
            font-weight: bold;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .nav-item.active { color: var(--color-chumtoto); }
        .nav-icon { font-size: 18px; }
    </style>
</head>
<body>

<header>
    <a href="index.html" class="back-portal-btn">◀ Portal</a>
    <h1>ChumToto New Field Entry</h1>
</header>

<div class="container">
    <form id="entryForm" class="form-card" onsubmit="submitForm(event)">
        
        <div class="toggle-row">
            <div class="toggle-label">当日の現場に参戦した</div>
            <label class="switch">
                <input type="checkbox" id="attendance" checked onchange="toggleAttendance(this.checked)">
                <span class="slider"></span>
            </label>
        </div>

        <div class="form-group">
            <label for="date">開催日程</label>
            <input type="date" id="date" class="form-control" required>
        </div>

        <div class="form-group">
            <label for="event_name">イベント・現場名</label>
            <input type="text" id="event_name" class="form-control" placeholder="例: 定期公演 / 対バンライブ" required>
        </div>

        <div class="form-group">
            <label for="venue">会場・ロケーション</label>
            <input type="text" id="venue" class="form-control" placeholder="例: 都内ライブハウス / 各地方会場">
        </div>

        <div id="financial-inputs-block">
            <div class="form-group">
                <label for="ticket_fee">チケット代・ドリンク代（決済した総額）</label>
                <input type="number" id="ticket_fee" class="form-control" value="0" min="0">
            </div>

            <div class="sub-section-title">📸 特典会・物販オプションの記録</div>
            
            <div class="option-counter-row">
                <div class="option-name">サインチェキ (¥3,000)</div>
                <div class="counter-controls">
                    <div class="counter-btn" onclick="stepCount('sign_cheki', -1)">-</div>
                    <div class="counter-val" id="val-sign_cheki">0</div>
                    <div class="counter-btn" onclick="stepCount('sign_cheki', 1)">+</div>
                </div>
            </div>

            <div class="option-counter-row">
                <div class="option-name">白チェキ (¥2,000)</div>
                <div class="counter-controls">
                    <div class="counter-btn" onclick="stepCount('white_cheki', -1)">-</div>
                    <div class="counter-val" id="val-white_cheki">0</div>
                    <div class="counter-btn" onclick="stepCount('white_cheki', 1)">+</div>
                </div>
            </div>

            <div class="option-counter-row">
                <div class="option-name">衣装のままTikTok (¥3,500)</div>
                <div class="counter-controls">
                    <div class="counter-btn" onclick="stepCount('tiktok', -1)">-</div>
                    <div class="counter-val" id="val-tiktok">0</div>
                    <div class="counter-btn" onclick="stepCount('tiktok', 1)">+</div>
                </div>
            </div>

            <div class="option-counter-row">
                <div class="option-name">囲みチェキ (¥4,000)</div>
                <div class="counter-controls">
                    <div class="counter-btn" onclick="stepCount('kakomi', -1)">-</div>
                    <div class="counter-val" id="val-kakomi">0</div>
                    <div class="counter-btn" onclick="stepCount('kakomi', 1)">+</div>
                </div>
            </div>

            <div class="option-counter-row">
                <div class="option-name">私物サイン券 (¥4,500)</div>
                <div class="counter-controls">
                    <div class="counter-btn" onclick="stepCount('item_sign', -1)">-</div>
                    <div class="counter-val" id="val-item_sign">0</div>
                    <div class="counter-btn" onclick="stepCount('item_sign', 1)">+</div>
                </div>
            </div>

            <div class="option-counter-row">
                <div class="option-name">お見送り会参加券 (¥1,500)</div>
                <div class="counter-controls">
                    <div class="counter-btn" onclick="stepCount('omiyokuri', -1)">-</div>
                    <div class="counter-val" id="val-omiyokuri">0</div>
                    <div class="counter-btn" onclick="stepCount('omiyokuri', 1)">+</div>
                </div>
            </div>
        </div>

        <button type="submit" class="submit-btn" id="submitBtn">送信してスプレッドシートへ記録</button>
    </form>
</div>

<nav class="nav-bar">
    <a href="calendar.html" class="nav-item"><span class="nav-icon">📅</span>Schedule</a>
    <a href="dashboard.html" class="nav-item"><span class="nav-icon">📊</span>Stats</a>
    <a href="entry.html" class="nav-item active"><span class="nav-icon">✍️</span>Entry</a>
</nav>

<script>
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbw7KeuN0XckEqU9V4wRxR3O8T9Rl6cC2jQesEOpOsNJTF09ZylpVFZWJnqo0aff1YNFRw/exec';
    let scheduleEvents = [];
    let viewMode = "calendar";

    window.onload = async function() {
        try {
            const response = await fetch(GAS_URL + "?action=read_schedule");
            const res = await response.json();
            if (res.result === "success") {
                scheduleEvents = res.data;
                document.getElementById('loading-msg').style.display = 'none';
                render(false);
            }
        } catch(e) {
            document.getElementById('loading-msg').innerText = "Failed To Data Sync";
        }
    }

    function render(isListMode) {
        const calArea = document.getElementById('calendar-view-area');
        const listArea = document.getElementById('list-view-area');
        const listContainer = document.getElementById('event-display-list');

        if (isListMode) {
            calArea.style.display = 'none';
            listArea.style.display = 'block';
            listContainer.style.display = 'flex';
            renderListView(scheduleEvents);
        } else {
            calArea.style.display = 'block';
            listArea.style.display = 'none';
            listContainer.style.display = 'flex';
            renderCalendarView(scheduleEvents);
        }
    }

    function renderCalendarView(events) {
        const grid = document.getElementById('calendar-grid-box');
        const lbl = document.getElementById('current-month-lbl');
        const listContainer = document.getElementById('event-display-list');
        grid.innerHTML = '';
        listContainer.innerHTML = '';

        const today = new Date();
        const year = today.getFullYear();
        const month = today.getMonth();

        lbl.innerText = `${year}年 ${month + 1}月`;

        const weekdays = ['日', '月', '火', '水', '木', '金', '土'];
        weekdays.forEach(w => grid.innerHTML += `<div class="weekday">${w}</div>`);

        const firstDay = new Date(year, month, 1).getDay();
        const lastDate = new Date(year, month + 1, 0).getDate();
        const prevLastDate = new Date(year, month, 0).getDate();

        for (let i = firstDay - 1; i >= 0; i--) {
            grid.innerHTML += `<div class="cal-day">${prevLastDate - i}</div>`;
        }

        let todaySet = null;
        for (let d = 1; d <= lastDate; d++) {
            const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
            const dayEvents = events.filter(e => e.date === dateStr);
            
            let isToday = (d === today.getDate());
            let dayClass = isToday ? "cal-day current-month today" : "cal-day current-month";
            if (dayEvents.length > 0) dayClass += " has-event";

            let dotHtml = dayEvents.length > 0 ? '<div class="event-dot"></div>' : '';
            let clickAttr = dayEvents.length > 0 ? `onclick=\"showSelectedDayEvents('${dateStr}')\"` : '';

            grid.innerHTML += `
                <div class="${dayClass}" ${clickAttr}>
                    <span>${d}</span>
                    ${dotHtml}
                </div>
            `;
            if (isToday && dayEvents.length > 0) todaySet = dateStr;
        }

        const totalCells = firstDay + lastDate;
        const nextCells = totalCells % 7 === 0 ? 0 : 7 - (totalCells % 7);
        for (let n = 1; n <= nextCells; n++) {
            grid.innerHTML += `<div class="cal-day">${n}</div>`;
        }

        if (todaySet) {
            showSelectedDayEvents(todaySet);
        } else {
            listContainer.innerHTML = '<div style="color:var(--text-muted); font-size:11px; text-align:center; width:100%; padding:10px;">本日指定の公式スケジュールはありません</div>';
        }
    }

    function renderListView(events) {
        const listContainer = document.getElementById('event-display-list');
        if (events.length === 0) {
            listContainer.innerHTML = '<div style="color:var(--text-muted); font-size:11px; text-align:center; width:100%;">予定されているスケジュールはありません</div>';
            return;
        }

        const today = new Date();
        const todayStr = today.getFullYear() + '-' + String(today.getMonth() + 1).padStart(2, '0') + '-' + String(today.getDate()).padStart(2, '0');

        const sorted = [...events].sort((a,b) => (a.date || '').localeCompare(b.date || ''));
        
        let targetId = null;
        let minDiff = Infinity;

        sorted.forEach((ev, idx) => {
            if (!ev.date) return;
            const diff = new Date(ev.date) - today;
            if (ev.date === todayStr) {
                targetId = `ev-card-${idx}`;
                minDiff = -1;
            } else if (diff > 0 && diff < minDiff && minDiff !== -1) {
                minDiff = diff;
                targetId = `ev-card-${idx}`;
            }
        });

        if (!targetId && sorted.length > 0) {
            targetId = `ev-card-${sorted.length - 1}`;
        }

        listContainer.innerHTML = sorted.map((ev, idx) => {
            let dateBadge = '';
            let cardId = `ev-card-${idx}`;
            let extraClass = (cardId === targetId) ? "scroll-target" : "";

            if(ev.date) {
                const [y, m, d] = ev.date.split('-');
                dateBadge = `<span style="color:var(--color-chumtoto); font-weight:bold; margin-right:6px;">[${parseInt(m)}/${parseInt(d)}]</span>`;
            }
            const timeInfo = ev.time ? `<div class="event-info">⏰ ${ev.time}</div>` : '';
            const venueInfo = `<div class="event-info">📍 ${ev.venue || '詳細確認'}</div>`;
            const clickAction = `onclick="moveToEntry('${ev.date}', '${encodeURIComponent(ev.title)}', '${encodeURIComponent(ev.venue)}')"`

            return `
                <div id="${cardId}" class="event-card ${extraClass}" ${clickAction}>
                    <div class="event-title">${dateBadge}${ev.title}</div>
                    ${timeInfo}
                    ${venueInfo}
                </div>
            `;
        }).join('');

        if (targetId) {
            setTimeout(() => {
                const targetCard = document.getElementById(targetId);
                if (targetCard) {
                    targetCard.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                }
            }, 100);
        }
    }

    function createEventCard(ev) {
        const timeInfo = ev.time ? `<div class="event-info">⏰ ${ev.time}</div>` : '';
        const venueInfo = `<div class="event-info">📍 ${ev.venue || '詳細確認'}</div>`;
        const clickAction = `onclick="moveToEntry('${ev.date}', '${encodeURIComponent(ev.title)}', '${encodeURIComponent(ev.venue)}')"`

        return `
            <div class="event-card" ${clickAction}>
                <div class="event-title">${ev.title}</div>
                ${timeInfo}
                ${venueInfo}
            </div>
        `;
    }

    function moveToEntry(date, title, venue) {
        const targetUrl = `entry.html?date=${date}&event=${title}&location=${venue}`;
        if (confirm(`選択した現場を記録しますか？\n\n現場：${decodeURIComponent(title)}`)) {
            window.location.href = targetUrl;
        }
    }

    document.getElementById('listToggle').addEventListener('click', () => {
        viewMode = "list";
        document.getElementById('listToggle').classList.add('active');
        document.getElementById('calendarToggle').classList.remove('active');
        render(true);
    });

    document.getElementById('calendarToggle').addEventListener('click', () => {
        viewMode = "calendar";
        document.getElementById('calendarToggle').classList.add('active');
        document.getElementById('listToggle').classList.remove('active');
        render(false);
    });

    // 【PWA特効薬】iOSのホーム画面起動時にSafariのUI（白い上下バー）を絶対に出さない対策
    if (window.navigator.standalone) {
        document.addEventListener('click', function(event) {
            var a = event.target.closest('a');
            if (a && a.href && a.host === location.host) {
                event.preventDefault(); // 通常のブラウザ遷移を止める
                window.location.href = a.href; // アプリ内遷移としてJavaScriptで処理
            }
        }, false);
    }
</script>
</body>
</html>
