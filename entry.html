<!DOCTYPE html>
<html lang="ja">
<head>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ChumToto - New Field Entry</title>
    
    <link rel="apple-touch-icon" href="icon.png">

    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0d080a 0%, #1a1014 50%, #0d080a 100%);
            --header-gradient: linear-gradient(180deg, #24141a 0%, rgba(36, 20, 26, 0.95) 100%);
            --color-chumtoto: #FF6B9D;
            --text-main: #f5f0f2;
            --text-muted: #9e8891;
            --card-bg: rgba(255, 107, 157, 0.04);
            --card-border: rgba(255, 107, 157, 0.15);
            --input-bg: rgba(0, 0, 0, 0.4);
        }

        html { background: #0d080a; }
        body {
            margin: 0;
            font-family: 'Hiragino Kaku Gothic ProN', 'Yu Gothic', sans-serif;
            background: var(--bg-gradient);
            color: var(--text-main);
            min-height: 100vh;
            padding-bottom: 100px;
        }

        /* ヘッダー配置 */
        header {
            background: var(--header-gradient);
            border-bottom: 1px solid rgba(255, 107, 157, 0.15);
            padding: 10px 16px;
            padding-top: calc(10px + env(safe-area-inset-top));
            display: flex;
            align-items: center;
            justify-content: space-between;
            backdrop-filter: blur(12px);
            position: sticky;
            top: 0;
            z-index: 100;
            min-height: 38px;
            box-sizing: border-box;
            gap: 10px;
        }

        .back-portal-btn {
            color: var(--color-chumtoto);
            text-decoration: none;
            font-size: 11px;
            font-weight: bold;
            border: 1px solid rgba(255, 107, 157, 0.3);
            padding: 5px 8px;
            border-radius: 6px;
            background: rgba(255, 107, 157, 0.05);
            transition: 0.2s;
            white-space: nowrap;
            flex-shrink: 0;
        }
        .back-portal-btn:hover {
            background: rgba(255, 107, 157, 0.15);
        }

        header h1 {
            margin: 0;
            font-size: 13px;
            font-weight: 800;
            letter-spacing: 0.5px;
            color: #fff;
            text-shadow: 0 0 8px rgba(255, 107, 157, 0.4);
            flex: 1;
            text-align: right;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
            padding: 16px;
            box-sizing: border-box;
        }

        .form-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 14px;
            padding: 20px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
            box-sizing: border-box;
        }

        /* 参戦トグルエリア */
        .toggle-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            background: rgba(0,0,0,0.2);
            padding: 12px 16px;
            border-radius: 10px;
            border: 1px solid rgba(255,107,157,0.08);
        }
        .toggle-label { font-size: 13px; font-weight: bold; }
        
        .switch { position: relative; display: inline-block; width: 46px; height: 26px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #44353b; transition: .3s; border-radius: 26px; }
        .slider:before { position: absolute; content: ""; height: 20px; width: 20px; left: 3px; bottom: 3px; background-color: white; transition: .3s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--color-chumtoto); }
        input:checked + .slider:before { transform: translateX(20px); }

        .form-group {
            margin-bottom: 18px;
            box-sizing: border-box;
            width: 100%;
        }

        .form-group label {
            display: block;
            font-size: 11px;
            font-weight: bold;
            color: var(--text-muted);
            margin-bottom: 6px;
            letter-spacing: 0.5px;
        }

        /* フォームコントロール共通設定 */
        .form-control {
            width: 100%;
            background: var(--input-bg);
            border: 1px solid rgba(255, 107, 157, 0.25);
            border-radius: 8px;
            padding: 12px;
            color: #fff;
            font-size: 13px;
            box-sizing: border-box;
            font-family: inherit;
            transition: 0.2s;
        }
        .form-control:focus {
            outline: none;
            border-color: var(--color-chumtoto);
            box-shadow: 0 0 8px rgba(255, 107, 157, 0.2);
        }

        /* iOSのSafari/LINE内ブラウザでdate入力欄が突き抜けるバグの完全修正 */
        input[type="date"].form-control {
            -webkit-appearance: none; /* iOS標準のスタイル干渉をリセット */
            max-width: 100%;          /* 親要素(カード)からはみ出すのを絶対に防ぐ */
            min-width: 0;             /* ブラウザ既定の最小幅による押し出しを無効化 */
        }

        /* 特典会オプションセクション */
        .sub-section-title {
            font-size: 11px;
            font-weight: bold;
            color: var(--color-chumtoto);
            margin: 24px 0 12px 0;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .option-counter-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255, 107, 157, 0.05);
        }
        .option-name { font-size: 13px; font-weight: 500; }
        
        .counter-controls {
            display: flex;
            align-items: center;
            gap: 14px;
        }
        .counter-btn {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: rgba(255, 107, 157, 0.1);
            border: 1px solid rgba(255, 107, 157, 0.3);
            color: var(--color-chumtoto);
            font-size: 16px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            user-select: none;
        }
        .counter-btn:active { background: rgba(255, 107, 157, 0.25); }
        .counter-val { font-size: 14px; font-weight: bold; width: 20px; text-align: center; }

        .submit-btn {
            width: 100%;
            background: var(--color-chumtoto);
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 14px;
            font-size: 14px;
            font-weight: bold;
            margin-top: 24px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 107, 157, 0.3);
            transition: 0.2s;
        }
        .submit-btn:active { transform: scale(0.98); opacity: 0.9; }

        /* ボトムナビゲーションバー */
        .nav-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(19, 11, 14, 0.92);
            border-top: 1px solid rgba(255, 107, 157, 0.1);
            display: flex;
            padding: 6px 0;
            padding-bottom: calc(6px + env(safe-area-inset-bottom));
            backdrop-filter: blur(10px);
            z-index: 100;
        }

        .nav-item {
            flex: 1;
            text-align: center;
            text-decoration: none;
            color: var(--text-muted);
            font-size: 10px;
            font-weight: bold;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .nav-item.active { color: var(--color-chumtoto); }
        .nav-icon { font-size: 18px; }
    </style>
</head>
<body>

<header>
    <a href="index.html" class="back-portal-btn">◀ Portal</a>
    <h1>ChumToto New Field Entry</h1>
</header>

<div class="container">
    <form id="entryForm" class="form-card" onsubmit="submitForm(event)">
        
        <div class="toggle-row">
            <div class="toggle-label">当日の現場に参戦した</div>
            <label class="switch">
                <input type="checkbox" id="attendance" checked onchange="toggleAttendance(this.checked)">
                <span class="slider"></span>
            </label>
        </div>

        <div class="form-group">
            <label for="date">開催日程</label>
            <input type="date" id="date" class="form-control" required>
        </div>

        <div class="form-group">
            <label for="event_name">イベント・現場名</label>
            <input type="text" id="event_name" class="form-control" placeholder="例: 定期公演 / 対バンライブ" required>
        </div>

        <div class="form-group">
            <label for="venue">会場・ロケーション</label>
            <input type="text" id="venue" class="form-control" placeholder="例: 都内ライブハウス / 各地方会場">
        </div>

        <div id="financial-inputs-block">
            <div class="form-group">
                <label for="ticket_fee">チケット代・ドリンク代（決済した総額）</label>
                <input type="number" id="ticket_fee" class="form-control" value="0" min="0">
            </div>

            <div class="sub-section-title">📸 特典会・物販オプションの記録</div>
            
            <div class="option-counter-row">
                <div class="option-name">サインチェキ (¥3,000)</div>
                <div class="counter-controls">
                    <div class="counter-btn" onclick="stepCount('sign_cheki', -1)">-</div>
                    <div class="counter-val" id="val-sign_cheki">0</div>
                    <div class="counter-btn" onclick="stepCount('sign_cheki', 1)">+</div>
                </div>
            </div>

            <div class="option-counter-row">
                <div class="option-name">白チェキ (¥2,000)</div>
                <div class="counter-controls">
                    <div class="counter-btn" onclick="stepCount('white_cheki', -1)">-</div>
                    <div class="counter-val" id="val-white_cheki">0</div>
                    <div class="counter-btn" onclick="stepCount('white_cheki', 1)">+</div>
                </div>
            </div>

            <div class="option-counter-row">
                <div class="option-name">ツーショット写メ (¥3,000)</div>
                <div class="counter-controls">
                    <div class="counter-btn" onclick="stepCount('twoshot', -1)">-</div>
                    <div class="counter-val" id="val-twoshot">0</div>
                    <div class="counter-btn" onclick="stepCount('twoshot', 1)">+</div>
                </div>
            </div>

            <div class="option-counter-row">
                <div class="option-name">TikTok (¥3,500)</div>
                <div class="counter-controls">
                    <div class="counter-btn" onclick="stepCount('tiktok', -1)">-</div>
                    <div class="counter-val" id="val-tiktok">0</div>
                    <div class="counter-btn" onclick="stepCount('tiktok', 1)">+</div>
                </div>
            </div>

            <div class="option-counter-row">
                <div class="option-name">囲み写メ (¥4,000)</div>
                <div class="counter-controls">
                    <div class="counter-btn" onclick="stepCount('kakomi', -1)">-</div>
                    <div class="counter-val" id="val-kakomi">0</div>
                    <div class="counter-btn" onclick="stepCount('kakomi', 1)">+</div>
                </div>
            </div>

            <!-- 🆕 追加項目 -->
            <div class="option-counter-row">
                <div class="option-name">囲み写メ (¥5,000)</div>
                <div class="counter-controls">
                    <div class="counter-btn" onclick="stepCount('kakomi_shame', -1)">-</div>
                    <div class="counter-val" id="val-kakomi_shame">0</div>
                    <div class="counter-btn" onclick="stepCount('kakomi_shame', 1)">+</div>
                </div>
            </div>

            <div class="option-counter-row">
                <div class="option-name">私物サイン券 (¥4,500)</div>
                <div class="counter-controls">
                    <div class="counter-btn" onclick="stepCount('item_sign', -1)">-</div>
                    <div class="counter-val" id="val-item_sign">0</div>
                    <div class="counter-btn" onclick="stepCount('item_sign', 1)">+</div>
                </div>
            </div>

            <div class="option-counter-row">
                <div class="option-name">お見送り会参加券 (¥1,500)</div>
                <div class="counter-controls">
                    <div class="counter-btn" onclick="stepCount('omiyokuri', -1)">-</div>
                    <div class="counter-val" id="val-omiyokuri">0</div>
                    <div class="counter-btn" onclick="stepCount('omiyokuri', 1)">+</div>
                </div>
            </div>
        </div>

        <button type="submit" class="submit-btn" id="submitBtn">送信してスプレッドシートへ記録</button>
    </form>
</div>

<nav class="nav-bar">
    <a href="calendar.html" class="nav-item"><span class="nav-icon">📅</span>Schedule</a>
    <a href="dashboard.html" class="nav-item"><span class="nav-icon">📊</span>Stats</a>
    <a href="entry.html" class="nav-item active"><span class="nav-icon">✍️</span>Entry</a>
</nav>

<script>
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbw7KeuN0XckEqU9V4wRxR3O8T9Rl6cC2jQesEOpOsNJTF09ZylpVFZWJnqo0aff1YNFRw/exec';

    // 💡 編集モード管理（dashboard の「修正する」から row_index 付きで来たとき）
    let EDIT_MODE = false;
    let EDIT_ROW_INDEX = null;

    // 💡 各オプションの単価設定
    const PRICES = {
        sign_cheki: 3000,
        white_cheki: 2000,
        twoshot: 3000, // 🆕 ツーショット写メ
        tiktok: 3500,
        kakomi: 4000,
        kakomi_shame: 5000, // 🆕 追加
        item_sign: 4500,
        omiyokuri: 1500
    };

    // 各オプションの枚数管理用カウント
    const counts = {
        sign_cheki: 0,
        white_cheki: 0,
        twoshot: 0, // 🆕 ツーショット写メ
        tiktok: 0,
        kakomi: 0,
        kakomi_shame: 0, // 🆕 追加
        item_sign: 0,
        omiyokuri: 0
    };

    // 画面が読み込まれたときの処理
    window.onload = function() {
        const params = new URLSearchParams(window.location.search);

        // 🆕 編集モード判定（dashboard から row_index 付きで来た場合は上書き更新）
        if (params.get('mode') === 'edit' && params.get('row_index')) {
            EDIT_MODE = true;
            EDIT_ROW_INDEX = params.get('row_index');
            const btn = document.getElementById('submitBtn');
            if (btn) btn.innerText = "修正内容を上書き保存";
            const h1 = document.querySelector('h1');
            if (h1) h1.innerText = "ChumToto Field Entry（修正）";
        }

        // カレンダー（Schedule）画面や修正リンクから日付やイベント名を引き継いで遷移してきた場合の自動入力
        if (params.get('date')) document.getElementById('date').value = params.get('date');
        if (params.get('event')) document.getElementById('event_name').value = decodeURIComponent(params.get('event'));
        if (params.get('location')) document.getElementById('venue').value = decodeURIComponent(params.get('location'));

        // 🆕 参戦/不参戦の復元
        if (params.get('attendance')) {
            const att = decodeURIComponent(params.get('attendance'));
            const isAttend = att !== "不参戦" && att !== "不参加";
            document.getElementById('attendance').checked = isAttend;
            toggleAttendance(isAttend);
        }

        // 🆕 チケット代・チェキ枚数の復元（編集時に未入力で上書き消失しないように）
        if (params.get('ticket_fee')) document.getElementById('ticket_fee').value = parseInt(params.get('ticket_fee')) || 0;
        for (let key in counts) {
            if (params.get(key) !== null) {
                counts[key] = parseInt(params.get(key)) || 0;
                const el = document.getElementById(`val-${key}`);
                if (el) el.innerText = counts[key];
            }
        }

        // パラメータがない場合は自動で今日の日付をセット
        if (!document.getElementById('date').value) {
            const today = new Date();
            const yyyy = today.getFullYear();
            const mm = String(today.getMonth() + 1).padStart(2, '0');
            const dd = String(today.getDate()).padStart(2, '0');
            document.getElementById('date').value = `${yyyy}-${mm}-${dd}`;
        }
    };

    // カウンターボタンの処理（増減）
    function stepCount(type, step) {
        if (!document.getElementById('attendance').checked) return; // 不参戦の場合は無効化
        counts[type] = Math.max(0, counts[type] + step);
        document.getElementById(`val-${type}`).innerText = counts[type];
    }

    // 参戦トグルの切り替え処理
    function toggleAttendance(checked) {
        const block = document.getElementById('financial-inputs-block');
        if (checked) {
            block.style.display = 'block';
        } else {
            block.style.display = 'none';
            // 不参戦のときは金額や枚数をすべて0にリセット
            document.getElementById('ticket_fee').value = 0;
            for (let key in counts) {
                counts[key] = 0;
                const el = document.getElementById(`val-${key}`);
                if (el) el.innerText = 0;
            }
        }
    }

    // フォーム送信（GASへの送信と合計金額計算）
    async function submitForm(event) {
        event.preventDefault();
        
        const submitBtn = document.getElementById('submitBtn');
        submitBtn.disabled = true;
        submitBtn.innerText = "送信中...";

        const attendance = document.getElementById('attendance').checked;
        const date = document.getElementById('date').value;
        const event_name = document.getElementById('event_name').value;
        const venue = document.getElementById('venue').value;
        
        let ticket_fee = 0;
        let total_cheki_fee = 0;
        
        if (attendance) {
            ticket_fee = parseInt(document.getElementById('ticket_fee').value) || 0;
            for (let key in counts) {
                total_cheki_fee += counts[key] * PRICES[key];
            }
        }

        // GASに送るデータオブジェクトの構築
        const payload = {
            action: EDIT_MODE ? "update_history" : "write_entry",
            date: date,
            attendance: attendance ? "参戦" : "不参戦",
            event_name: event_name,
            venue: venue,
            ticket_fee: ticket_fee,
            sign_cheki: counts.sign_cheki,
            white_cheki: counts.white_cheki,
            twoshot: counts.twoshot, // 🆕 ツーショット写メ
            tiktok: counts.tiktok,
            kakomi: counts.kakomi,
            kakomi_shame: counts.kakomi_shame, // 🆕 GASに送る項目追加
            item_sign: counts.item_sign,
            omiyokuri: counts.omiyokuri,
            total_fee: ticket_fee + total_cheki_fee
        };

        // 🆕 編集モードのときは上書き対象の行番号を付与
        if (EDIT_MODE) payload.row_index = EDIT_ROW_INDEX;

        try {
            const response = await fetch(GAS_URL, {
                method: 'POST',
                body: JSON.stringify(payload)
            });
            const res = await response.json();
            
            if (res.status === "success" || res.result === "success") {
                alert(EDIT_MODE ? "修正内容を上書きしました！" : "スプレッドシートに記録しました！");
                window.location.href = EDIT_MODE ? "dashboard.html" : "index.html";
            } else {
                alert("エラーが発生しました: " + (res.message || "不明なエラー"));
            }
        } catch (e) {
            // GASのCORS仕様で稀にエラー扱いに見えても送信完了しているケースがあるため、柔軟に逃がす
            alert("データを送信しました。戻ります。");
            window.location.href = EDIT_MODE ? "dashboard.html" : "index.html";
        } finally {
            submitBtn.disabled = false;
            submitBtn.innerText = "送信してスプレッドシートへ記録";
        }
    }

    // 【PWA特効薬】iOSのホーム画面起動時にSafariのUI（白い上下バー）を絶対に出さない対策
    if (window.navigator.standalone) {
        document.addEventListener('click', function(event) {
            var a = event.target.closest('a');
            if (a && a.href && a.host === location.host) {
                event.preventDefault();
                window.location.href = a.href;
            }
        }, false);
    }
</script>
</body>
</html>
